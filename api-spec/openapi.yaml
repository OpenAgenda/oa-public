    EventList:
      type: object
      required: [data, pagination]
      additionalProperties: false
      properties:
        data:
          type: array
          description: >
            `EventSummary` items by default, or full `Event` items when
            `detailed=true` is passed. The two are mutually exclusive
            (`additionalProperties: false`), so each item validates against
            exactly one branch.
          items:
            # Detailed branch first — see LocationList for why.
            oneOf:
              - $ref: '#/components/schemas/Event'
              - $ref: '#/components/schemas/EventSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    FacetName:
      type: string
      description: A facet type name (shared by the GET `facets` list and the POST report).
      enum:
        - additionalFields
        - additionalFieldMetrics
        - cities
        - regions
        - departments
        - districts
        - countryCodes
        - keywords
        - languages
        - accessibilities
        - status
        - attendanceModes
        - originAgendas
        - sourceAgendas
        - locations
        - geohash
        - viewport
        - timespan
        - timings
        - dateRanges

    FacetSpec:
      type: object
      required: [type]
      additionalProperties: false
      description: >
        A single named aggregation in a facet report. `name` (the output key)
        defaults to `type`; reuse a `type` under distinct `name`s to aggregate
        the same field several ways in one request. Options not relevant to the
        `type` are ignored.
      properties:
        name:
          type: string
          description: >
            Output key (alias). Defaults to `type`. Must be unique within the
            request — it is the key the result is returned under.
        type:
          $ref: '#/components/schemas/FacetName'
        size:
          type: integer
          minimum: 1
          maximum: 250
          description: Max buckets (bucket-list families). Overrides `facetSize`.
        sort:
          type: string
          enum: [count, alpha]
          description: Bucket order. Overrides `facetSort`.
        missing:
          type: string
          description: >
            Label for a synthetic bucket counting events with no value for the
            field (value-keyed term facets only; ignored elsewhere).
        zoom:
          type: integer
          minimum: 1
          description: Clustering zoom for the `geohash` facet.
        interval:
          type: string
          enum: [hour, day, week, month, year]
          description: Bucket width for the `timings` date histogram.
        month:
          type: string
          description: Calendar month (`YYYY-MM`) for the `dateRanges` facet.
        fields:
          type: array
          items: { type: string }
          description: >
            For `additionalFields`/`additionalFieldMetrics`: which agenda fields
            to aggregate (default: all readable fields of the matching type).

    FacetReportRequest:
      type: object
      required: [facets]
      additionalProperties: false
      description: Body of the named-aggregations facet report (`POST .../events/facets`).
      example:
        filters: { keyword: [concert] }
        facets:
          - cities
          - { name: topKeywords, type: keywords, size: 20, sort: count }
          - { name: byMonth, type: timings, interval: month }
          - { name: byYear, type: timings, interval: year }
      properties:
        filters:
          $ref: '#/components/schemas/EventFilters'
        facetSize:
          type: integer
          minimum: 1
          maximum: 250
          default: 10
          description: Request-wide default bucket size; a facet's own `size` overrides it.
        facetSort:
          type: string
          enum: [count, alpha]
          default: count
          description: Request-wide default order; a facet's own `sort` overrides it.
        facets:
          type: array
          minItems: 1
          description: >
            The aggregations to compute. Each item is either a bare facet name
            (simple form) or a `FacetSpec` object (named, with options).
          items:
            oneOf:
              - $ref: '#/components/schemas/FacetName'
              - $ref: '#/components/schemas/FacetSpec'

    EventFilters:
      type: object
      description: >
        Filters scoping the facet report — the same fields as the
        `agendas.events.list` query parameters, in their native JSON types.
        Unknown keys are ignored (forward-compatible).
      properties:
        search: { type: string }
        uid: { type: array, items: { type: integer } }
        slug: { type: array, items: { type: string } }
        extId:
          type: object
          properties: { key: { type: string }, value: { type: string } }
        keyword: { type: array, items: { type: string } }
        language: { type: array, items: { type: string } }
        accessibility:
          type: array
          items: { type: string, enum: [hi, ii, mi, pi, vi] }
        status:
          { type: array, items: { type: integer, enum: [1, 2, 3, 4, 5, 6] } }
        attendanceMode:
          { type: array, items: { type: integer, enum: [1, 2, 3] } }
        featured: { type: boolean }
        locationUid: { type: array, items: { type: integer } }
        locationExtId:
          type: object
          properties: { key: { type: string }, value: { type: string } }
        region: { type: array, items: { type: string } }
        department: { type: array, items: { type: string } }
        city: { type: array, items: { type: string } }
        district: { type: array, items: { type: string } }
        adminLevel3: { type: array, items: { type: string } }
        adminLevel5: { type: array, items: { type: string } }
        countryCode: { type: array, items: { type: string } }
        bbox:
          {
            type: string,
            description: '"west,south,east,north" in decimal degrees.',
          }
        near: { type: string, description: '"lat,lng" — requires `radius`.' }
        radius: { type: integer, description: Metres; requires `near`. }
        originAgendaUid: { type: array, items: { type: integer } }
        originAgendaOfficial: { type: boolean }
        sourceAgendaUid: { type: array, items: { type: integer } }
        relative:
          type: array
          items: { type: string, enum: [passed, upcoming, current] }
        timings: { $ref: '#/components/schemas/DateRangeFilter' }
        createdAt: { $ref: '#/components/schemas/DateRangeFilter' }
        updatedAt: { $ref: '#/components/schemas/DateRangeFilter' }
        localTime:
          type: object
          properties: { gte: { type: integer }, lte: { type: integer } }
        age:
          type: object
          properties: { gte: { type: integer }, lte: { type: integer } }
        sort: { type: string }
        additionalFields:
          type: object
          description: Per-field filters, keyed by agenda field name.

    DateRangeFilter:
      type: object
      description: A date range; bounds are RFC 3339 (date or date-time with offset).
      properties:
        gte: { type: string }
        lte: { type: string }

    FacetReport:
      type: object
      required: [facets]
      additionalProperties: false
      description: Named facet results, keyed by each facet's `name` alias.
      example:
        facets:
          cities: { type: cities, result: [{ value: Lyon, count: 42 }] }
          byMonth:
            type: timings
            result:
              [{ value: '2025-06', count: 18 }, { value: '2025-07', count: 31 }]
      properties:
        facets:
          type: object
          description: One entry per requested facet, keyed by its `name` alias.
          additionalProperties:
            $ref: '#/components/schemas/FacetReportEntry'

    FacetReportEntry:
      description: >
        A facet result tagged with its `type`. The `type` tells the client how
        to read `result` (a bucket array, a viewport/timespan object or `null`,
        or a per-field map).
      oneOf:
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type:
              type: string
              enum:
                [
                  cities,
                  regions,
                  departments,
                  districts,
                  countryCodes,
                  keywords,
                  languages,
                  accessibilities,
                  status,
                  attendanceModes,
                  timings,
                  dateRanges,
                ]
            result:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type: { type: string, enum: [originAgendas] }
            result:
              type: array
              items: { $ref: '#/components/schemas/AgendaFacetBucket' }
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type: { type: string, enum: [sourceAgendas] }
            result:
              type: array
              items: { $ref: '#/components/schemas/SourceAgendaFacetBucket' }
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type: { type: string, enum: [locations] }
            result:
              type: array
              items: { $ref: '#/components/schemas/LocationFacetBucket' }
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type: { type: string, enum: [geohash] }
            result:
              type: array
              items: { $ref: '#/components/schemas/GeoFacetBucket' }
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type: { type: string, enum: [viewport] }
            result:
              oneOf:
                - $ref: '#/components/schemas/Viewport'
                - type: 'null'
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type: { type: string, enum: [timespan] }
            result:
              oneOf:
                - $ref: '#/components/schemas/Timespan'
                - type: 'null'
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type: { type: string, enum: [additionalFields] }
            result:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/AdditionalFieldFacet'
        - type: object
          required: [type, result]
          additionalProperties: false
          properties:
            type: { type: string, enum: [additionalFieldMetrics] }
            result:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/AdditionalFieldMetricsFacet'

    FacetBucket:
      type: object
      required: [value, count]
      additionalProperties: false
      properties:
        value:
          type: string
          description: >
            The facet value — e.g. a city name, a keyword, a language code, a
            status. Always a string (numeric-keyed facets are stringified).
        count:
          type: integer
          description: Number of events in the filtered set with this value.

    FacetResults:
      type: object
      required: [facets]
      additionalProperties: false
      example:
        facets:
          cities:
            - { value: Lyon, count: 42 }
            - { value: Villeurbanne, count: 11 }
          keywords:
            - { value: jazz, count: 18 }
            - { value: concert, count: 57 }
          status:
            - { value: '1', count: 80 }
            - { value: '6', count: 7 }
          attendanceModes:
            - { value: '1', count: 74 }
            - { value: '2', count: 13 }
          originAgendas:
            - agenda:
                uid: 12345
                title: Festival des Lumières
                slug: festival-des-lumieres
                image: https://cdn.openagenda.com/main/12345.jpg
                url: https://openagenda.com/festival-des-lumieres
                official: true
              count: 87
          timespan:
            first: '2025-06-20T18:00:00+02:00'
            last: '2025-09-14T20:00:00+02:00'
          viewport:
            topLeft: { latitude: 45.808, longitude: 4.812 }
            bottomRight: { latitude: 45.748, longitude: 4.879 }
      properties:
        facets:
          type: object
          additionalProperties: false
          description: >
            One entry per requested facet; a facet that was not requested is
            absent. Each value is an array of `{ value, count }` buckets.
          properties:
            cities:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            regions:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            departments:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            districts:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            countryCodes:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            keywords:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            languages:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            accessibilities:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            status:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            attendanceModes:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            originAgendas:
              type: array
              items: { $ref: '#/components/schemas/AgendaFacetBucket' }
            sourceAgendas:
              type: array
              items: { $ref: '#/components/schemas/SourceAgendaFacetBucket' }
            locations:
              type: array
              items: { $ref: '#/components/schemas/LocationFacetBucket' }
            geohash:
              type: array
              items: { $ref: '#/components/schemas/GeoFacetBucket' }
            viewport:
              oneOf:
                - $ref: '#/components/schemas/Viewport'
                - type: 'null'
            timespan:
              oneOf:
                - $ref: '#/components/schemas/Timespan'
                - type: 'null'
            timings:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            dateRanges:
              type: array
              items: { $ref: '#/components/schemas/FacetBucket' }
            additionalFields:
              type: object
              description: >
                One entry per requested (and readable) agenda choice/boolean
                field, keyed by field name.
              additionalProperties:
                x-additionalPropertiesName: fieldName
                allOf:
                  - $ref: '#/components/schemas/AdditionalFieldFacet'
            additionalFieldMetrics:
              type: object
              description: >
                One entry per requested (and readable) agenda numeric field,
                keyed by field name.
              additionalProperties:
                x-additionalPropertiesName: fieldName
                allOf:
                  - $ref: '#/components/schemas/AdditionalFieldMetricsFacet'

    AdditionalFieldFacet:
      type: object
      required: [label, values]
      additionalProperties: false
      description: An agenda choice/boolean field with per-option event counts.
      properties:
        label:
          $ref: '#/components/schemas/LocalizedString'
        values:
          type: array
          items: { $ref: '#/components/schemas/AdditionalFieldBucket' }

    AdditionalFieldBucket:
      type: object
      required: [value, label, count]
      additionalProperties: false
      properties:
        value:
          type: string
          description: The option id (or `true`/`false` for boolean fields).
        label:
          description: >
            Localized option label, or `null` when the option has none (boolean
            fields).
          oneOf:
            - $ref: '#/components/schemas/LocalizedString'
            - type: 'null'
        count:
          type: integer
          description: Number of events in the filtered set with this option.

    AdditionalFieldMetricsFacet:
      type: object
      required: [label, metrics]
      additionalProperties: false
      description: An agenda numeric field with summary statistics.
      properties:
        label:
          $ref: '#/components/schemas/LocalizedString'
        metrics:
          $ref: '#/components/schemas/AdditionalFieldMetrics'

    AdditionalFieldMetrics:
      type: object
      required: [sum, avg, max, min]
      additionalProperties: false
      description: >
        Summary statistics over the field's numeric values across the filtered
        set. Each is `null` when no event in the set carries a value.
      properties:
        sum:
          type: [number, 'null']
        avg:
          type: [number, 'null']
        max:
          type: [number, 'null']
        min:
          type: [number, 'null']

    AgendaFacetBucket:
      type: object
      required: [agenda, count]
      additionalProperties: false
      description: >
        An origin-agenda facet bucket — events grouped by origin agenda. `agenda`
        is an `AgendaRef` (uid, title, slug, image, url; `official` is not indexed
        for this aggregation). Use the uid with the `originAgendaUid` filter.
      properties:
        agenda:
          $ref: '#/components/schemas/AgendaRef'
        count:
          type: integer
          description: Number of events in the filtered set from this agenda.

    SourceAgendaFacetBucket:
      type: object
      required: [agenda, count]
      additionalProperties: false
      description: >
        A source-agenda facet bucket — events grouped by source (aggregated)
        agenda. `agenda` is a `SourceAgendaRef` (uid, title, image only). Use the
        uid with the `sourceAgendaUid` filter.
      properties:
        agenda:
          $ref: '#/components/schemas/SourceAgendaRef'
        count:
          type: integer
          description: Number of events in the filtered set from this source agenda.

    LocationFacetBucket:
      type: object
      required: [location, count]
      additionalProperties: false
      description: >
        A location facet bucket — events grouped by their attached location.
        `location` carries only what the aggregation indexes (uid and name),
        narrower than events' `location`. Use the uid with the `locationUid`
        filter.
      properties:
        location:
          type: object
          required: [uid, name]
          additionalProperties: false
          properties:
            uid:
              type: integer
              format: int64
            name:
              type: [string, 'null']
        count:
          type: integer
          description: Number of events in the filtered set at this location.

    GeoPoint:
      type: object
      required: [latitude, longitude]
      additionalProperties: false
      properties:
        latitude:
          type: number
        longitude:
          type: number

    GeoFacetBucket:
      type: object
      required: [value, count, latitude, longitude]
      additionalProperties: false
      description: >
        A geo-clustering bucket (from the `geohash` facet): a cluster centroid
        plus its event count, for plotting clustered markers on a map. Cluster
        granularity is controlled by `geohashZoom`.
      properties:
        value:
          type: string
          description: Opaque cluster id (the geohash grid key).
        count:
          type: integer
        latitude:
          type: number
        longitude:
          type: number

    Viewport:
      type: object
      required: [topLeft, bottomRight]
      additionalProperties: false
      description: >
        The bounding box enclosing all matching events' locations (from the
        `viewport` facet) — handy to auto-fit a map to the result set. The facet
        value is `null` when no event in the filtered set has coordinates.
      properties:
        topLeft:
          $ref: '#/components/schemas/GeoPoint'
        bottomRight:
          $ref: '#/components/schemas/GeoPoint'

    Timespan:
      type: object
      required: [first, last]
      additionalProperties: false
      description: >
        The date range spanned by the matching events (from the `timespan`
        facet): `first` is the earliest event start and `last` the latest, both
        RFC 3339 date-times — handy to bound a date picker to the result set. The
        facet value is `null` when no event in the filtered set has timings.
      properties:
        first:
          type: string
          format: date-time
        last:
          type: string
          format: date-time
