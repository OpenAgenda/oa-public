openapi: 3.1.0

info:
  title: OpenAgenda API
  version: '3.0.0-draft'
  description: |
    The OpenAgenda v3 API gives programmatic access to agendas, events and
    locations. This contract is the single source of truth behind the generated
    SDK, the MCP server and this reference.

    > **Draft.** v3 is a work in progress. Slice 1 covers read access to agendas
    > and events; the surface may still change.

    ## Authentication

    Every request is authenticated with `Authorization: Bearer <token>`, using
    one of two credentials:

    - **API key** — a publishable read-only key (`oa_pk_…`, safe to ship in a
      browser) for reads, or a secret key (`oa_sk_…`) for reads and writes.
      Best for server-to-server and scripts.
    - **OAuth 2.1** — authorization-code flow with mandatory PKCE (`S256`) for
      interactive apps acting on a user's behalf. The issued short-lived token
      carries the granted scopes (`agendas:read`, `events:read`, …). Public
      clients hold no secret.

    Use the **Authentication** selector at the top of this page to try requests
    with either credential directly from the browser.

    ## Pagination

    List endpoints are **cursor-paginated**. Read `pagination.after` from a
    response and pass it back as the `after` query parameter to fetch the next
    page. Filters are not encoded in the cursor, so keep them stable across
    pages.

    ## SDK & MCP

    - **TypeScript SDK** — [`@openagenda/api-client`](https://www.npmjs.com/package/@openagenda/api-client),
      generated from this contract (see the code samples on each operation).
    - **MCP server** — [`mcp.openagenda.com`](https://mcp.openagenda.com)
      exposes the same surface to AI agents over the Model Context Protocol.
  contact:
    name: OpenAgenda Support
    email: support@openagenda.com
    url: https://developers.openagenda.com
  license:
    name: Proprietary — © OpenAgenda
    identifier: LicenseRef-OpenAgenda-Proprietary
  # SDK-first story: the code samples on each operation use @openagenda/api-client
  # (generated from this very contract). Surface its install up front.
  x-scalar-sdk-installation:
    - lang: TypeScript
      description: |
        Install the official, fully-typed TypeScript SDK — generated from this
        contract, so it always matches the endpoints below:

        ```sh
        npm install @openagenda/api-client
        ```

        Every operation's code sample uses it.

servers:
  - url: https://api.openagenda.com/v3
    description: Production
  - url: https://dapi.openagenda.com/v3
    description: Development

tags:
  - name: Agendas
    description: >
      Agendas hold and publish events. List and inspect them, then drill into
      the events they publish.
  - name: Events
    description: Events published in an agenda.
  - name: Locations
    description: >
      Where events happen. Each agenda has its own pool of locations —
      or shares one with other agendas through a location set.
  - name: Me
    description: >
      The authenticated caller: the agendas they are a member of and their
      role on each. Requires a user identity — a secret key or an OAuth
      token; a publishable (`oa_pk_…`) key carries no identity and is denied.

# Groups the resource tags under a "Resources" heading in the Scalar sidebar.
# Forward-compatible with the upcoming members surface (see scopes).
x-tagGroups:
  - name: Resources
    tags:
      - Agendas
      - Events
      - Locations
      - Me

# Authenticate every request with either an API key or an OAuth2 token,
# both carried as `Authorization: Bearer <token>`.
security:
  - bearerAuth: []
  - oauth2:
      - events:read

paths:
  /agendas:
    get:
      operationId: agendas.list
      tags: [Agendas]
      summary: List agendas
      x-synonyms: [calendars, directory, catalogue, catalog, browse, find, all]
      x-codeSamples:
        - lang: TypeScript
          label: List official agendas
          source: |
            const { data, error } = await oa.agendas.list({
              query: { official: true, limit: 20 },
            });
            if (error) throw error;
            return data.data.map((a) => ({ uid: a.uid, title: a.title }));
      description: >
        Returns a cursor-paginated list of agendas. Pass the `after` cursor
        returned in `pagination.after` to fetch the next page; resend the same
        filters (they are not encoded in the cursor).


        By default items are the lighter `AgendaSummary`; pass `detailed=true`
        for `AgendaDetailed` (adds `createdAt`, `network`, `locationSet` — the
        search-index detailed projection). The full canonical record (with
        `url`, `updatedAt`, `officializedAt`, `private`, `indexed`) is only
        available via the single-agenda `GET /agendas/{agendaUid}`.


        Unknown or malformed filter values return `400`.
      security:
        - bearerAuth: []
        - oauth2:
            - agendas:read
      parameters:
        - $ref: '#/components/parameters/AfterCursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Detailed'
        - $ref: '#/components/parameters/AgendaSearch'
        - $ref: '#/components/parameters/AgendaFilterUid'
        - $ref: '#/components/parameters/AgendaFilterSlug'
        - $ref: '#/components/parameters/AgendaFilterOfficial'
      responses:
        '200':
          description: A page of agendas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AgendaList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /agendas/{agendaUid}:
    get:
      operationId: agendas.get
      tags: [Agendas]
      summary: Get one agenda
      x-synonyms:
        [calendar, detail, single, one, by id, uid, fetch, retrieve, lookup]
      x-codeSamples:
        - lang: TypeScript
          label: Get one agenda by uid
          source: |
            const { data, error } = await oa.agendas.get({
              path: { agendaUid: 12345 },
            });
            if (error) throw error;
            return data;
      description: >
        Returns a single agenda in its full `Agenda` representation, including
        `network` and `locationSet`.
      security:
        - bearerAuth: []
        - oauth2:
            - agendas:read
      parameters:
        - $ref: '#/components/parameters/AgendaUid'
      responses:
        '200':
          description: The agenda.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Agenda'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agendas/{agendaUid}/events:
    get:
      operationId: agendas.events.list
      tags: [Events]
      summary: List events of an agenda
      x-synonyms:
        [find, browse, filter, paginate, cursor, upcoming, when, where, date]
      x-codeSamples:
        - lang: TypeScript
          label: All upcoming events in Paris (paging every result)
          source: |
            const events = [];
            let after;
            do {
              const { data, error } = await oa.agendas.events.list({
                path: { agendaUid: 12345 },
                query: { city: ['Paris'], relative: ['upcoming'], limit: 100, after },
              });
              if (error) throw error;
              events.push(...data.data);
              after = data.pagination.after;
            } while (after);
            return events.length;
      description: >
        Returns a cursor-paginated list of events for the given agenda.
        Pass the `after` cursor returned in `pagination.after` to fetch the
        next page.


        Filters narrow the result set; they are NOT encoded in the cursor, so
        resend the same filter parameters when fetching subsequent pages.


        Only published events are listed. Unknown or malformed filter values
        return `400` with per-field context under `error.details`.
      security:
        - bearerAuth: []
        - oauth2:
            - events:read
      parameters:
        - $ref: '#/components/parameters/AgendaUid'
        - $ref: '#/components/parameters/AfterCursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Detailed'
        - $ref: '#/components/parameters/Sort'
        # text & identity
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/RelevanceThreshold'
        - $ref: '#/components/parameters/FilterUid'
        - $ref: '#/components/parameters/FilterSlug'
        - $ref: '#/components/parameters/FilterExtId'
        # classification
        - $ref: '#/components/parameters/FilterKeyword'
        - $ref: '#/components/parameters/FilterLanguage'
        - $ref: '#/components/parameters/FilterAccessibility'
        - $ref: '#/components/parameters/FilterStatus'
        - $ref: '#/components/parameters/FilterAttendanceMode'
        - $ref: '#/components/parameters/FilterFeatured'
        # place
        - $ref: '#/components/parameters/FilterLocationUid'
        - $ref: '#/components/parameters/FilterLocationExtId'
        - $ref: '#/components/parameters/FilterRegion'
        - $ref: '#/components/parameters/FilterDepartment'
        - $ref: '#/components/parameters/FilterCity'
        - $ref: '#/components/parameters/FilterDistrict'
        - $ref: '#/components/parameters/FilterAdminLevel3'
        - $ref: '#/components/parameters/FilterAdminLevel5'
        - $ref: '#/components/parameters/FilterCountryCode'
        - $ref: '#/components/parameters/FilterBoundingBox'
        - $ref: '#/components/parameters/FilterNear'
        - $ref: '#/components/parameters/FilterRadius'
        # provenance
        - $ref: '#/components/parameters/FilterOriginAgendaUid'
        - $ref: '#/components/parameters/FilterOriginAgendaOfficial'
        - $ref: '#/components/parameters/FilterSourceAgendaUid'
        # time
        - $ref: '#/components/parameters/FilterRelative'
        - $ref: '#/components/parameters/FilterTimings'
        - $ref: '#/components/parameters/FilterLocalTime'
        - $ref: '#/components/parameters/FilterCreatedAt'
        - $ref: '#/components/parameters/FilterUpdatedAt'
        # audience & additional fields
        - $ref: '#/components/parameters/FilterAge'
        - $ref: '#/components/parameters/FilterAdditionalFields'
      responses:
        '200':
          description: A page of events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agendas/{agendaUid}/events/{eventUid}:
    get:
      operationId: agendas.events.get
      tags: [Events]
      summary: Get a single event
      x-synonyms: [detail, single, one, by id, uid, fetch, retrieve, lookup]
      x-codeSamples:
        - lang: TypeScript
          label: Get a single event within an agenda
          source: |
            const { data, error } = await oa.agendas.events.get({
              path: { agendaUid: 12345, eventUid: 67890 },
            });
            if (error) throw error;
            return data;
      description: Returns a single event by its uid within the given agenda.
      security:
        - bearerAuth: []
        - oauth2:
            - events:read
      parameters:
        - $ref: '#/components/parameters/AgendaUid'
        - $ref: '#/components/parameters/EventUid'
      responses:
        '200':
          description: The event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agendas/{agendaUid}/events/facets:
    get:
      operationId: agendas.events.facets
      tags: [Events]
      summary: Faceted counts for an agenda's events — native facets plus its
        `additionalFields`
      x-synonyms:
        [
          aggregate,
          count,
          group,
          group by,
          stats,
          statistics,
          histogram,
          distribution,
          how many,
          breakdown,
          top,
        ]
      x-codeSamples:
        - lang: TypeScript
          label: Stats overview of an agenda
          source: |
            const { data, error } = await oa.agendas.events.facets({
              path: { agendaUid: 12345 },
              query: {
                facets: ['cities', 'keywords', 'timespan', 'additionalFields', 'additionalFieldMetrics'],
              },
            });
            if (error) throw error;
            return data.facets;
        - lang: TypeScript
          label: How many concert events per city
          source: |
            const { data, error } = await oa.agendas.events.facets({
              path: { agendaUid: 12345 },
              query: { facets: ['cities'], keyword: ['concert'] },
            });
            if (error) throw error;
            return data.facets.cities;
      description: >
        Returns event counts grouped by the requested facets, computed over the
        **same filtered set** as `agendas.events.list`. Pass the same filter
        parameters to scope the counts (e.g. `?keyword=concert` then facet on
        `cities`). No event data is returned — only `{ value, count }` buckets
        per facet.


        The native facets are not the whole story: the agenda's own fields
        (its categories, labels…) are faceted by `additionalFields` — request
        it too for an agenda-wide stats overview (`additionalFieldMetrics`
        covers its numeric fields). The fields themselves are declared by the
        agenda's event form schema
        (`GET /agendas/{agendaUid}/events/schema`).


        Only published events are counted. `facets` selects which facets to
        compute; an unknown facet name returns `400`. There is no pagination:
        facets describe the whole filtered set.
      security:
        - bearerAuth: []
        - oauth2:
            - events:read
      parameters:
        - $ref: '#/components/parameters/AgendaUid'
        - $ref: '#/components/parameters/Facets'
        - $ref: '#/components/parameters/FacetSize'
        - $ref: '#/components/parameters/FacetSizes'
        - $ref: '#/components/parameters/FacetSort'
        - $ref: '#/components/parameters/FacetSorts'
        - $ref: '#/components/parameters/FacetMissing'
        - $ref: '#/components/parameters/GeohashZoom'
        - $ref: '#/components/parameters/TimingsInterval'
        - $ref: '#/components/parameters/Month'
        - $ref: '#/components/parameters/AdditionalFieldsKeys'
        - $ref: '#/components/parameters/AdditionalFieldMetricsKeys'
        # Same filters as agendas.events.list — facets reflect the filtered set.
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/RelevanceThreshold'
        - $ref: '#/components/parameters/FilterUid'
        - $ref: '#/components/parameters/FilterSlug'
        - $ref: '#/components/parameters/FilterExtId'
        - $ref: '#/components/parameters/FilterKeyword'
        - $ref: '#/components/parameters/FilterLanguage'
        - $ref: '#/components/parameters/FilterAccessibility'
        - $ref: '#/components/parameters/FilterStatus'
        - $ref: '#/components/parameters/FilterAttendanceMode'
        - $ref: '#/components/parameters/FilterFeatured'
        - $ref: '#/components/parameters/FilterLocationUid'
        - $ref: '#/components/parameters/FilterLocationExtId'
        - $ref: '#/components/parameters/FilterRegion'
        - $ref: '#/components/parameters/FilterDepartment'
        - $ref: '#/components/parameters/FilterCity'
        - $ref: '#/components/parameters/FilterDistrict'
        - $ref: '#/components/parameters/FilterAdminLevel3'
        - $ref: '#/components/parameters/FilterAdminLevel5'
        - $ref: '#/components/parameters/FilterCountryCode'
        - $ref: '#/components/parameters/FilterBoundingBox'
        - $ref: '#/components/parameters/FilterNear'
        - $ref: '#/components/parameters/FilterRadius'
        - $ref: '#/components/parameters/FilterOriginAgendaUid'
        - $ref: '#/components/parameters/FilterOriginAgendaOfficial'
        - $ref: '#/components/parameters/FilterSourceAgendaUid'
        - $ref: '#/components/parameters/FilterRelative'
        - $ref: '#/components/parameters/FilterTimings'
        - $ref: '#/components/parameters/FilterLocalTime'
        - $ref: '#/components/parameters/FilterCreatedAt'
        - $ref: '#/components/parameters/FilterUpdatedAt'
        - $ref: '#/components/parameters/FilterAge'
        - $ref: '#/components/parameters/FilterAdditionalFields'
      responses:
        '200':
          description: Facet counts over the filtered set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacetResults'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: agendas.events.facetsReport
      tags: [Events]
      summary: Named, repeatable facet aggregations for an agenda's events
      x-synonyms:
        [aggregate, stats, statistics, dashboard, report, group by, breakdown]
      description: >
        The analytical projection of the facets surface. Where the `GET` form
        computes one bucket list per facet name, this `POST` form takes a JSON
        body of **named, repeatable** aggregations: the same facet `type` may
        appear several times under distinct `name` aliases, so a field can be
        aggregated several ways in one request (e.g. `timings` by `month` AND by
        `year`). Filters live under `filters` (the same shape as the
        `agendas.events.list` query parameters) and scope every facet.


        Each facet item is either a bare facet name (the simple form, identical
        to the `GET` enum) or an object `{ name?, type, … }` carrying
        per-instance options (`size`, `sort`, `missing`, `zoom`, `interval`,
        `fields`). `facetSize`/`facetSort` at the top level set the request-wide
        defaults an item overrides. The response is keyed by alias, each entry
        tagged with its `type` so the value shape is unambiguous. Only published
        events are counted.
      security:
        - bearerAuth: []
        - oauth2:
            - events:read
      parameters:
        - $ref: '#/components/parameters/AgendaUid'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacetReportRequest'
      responses:
        '200':
          description: Named facet results over the filtered set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacetReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agendas/{agendaUid}/events/schema:
    get:
      operationId: agendas.events.schema
      tags: [Events]
      summary: Event form schema of an agenda
      x-synonyms:
        [
          form,
          fields,
          additional fields,
          custom fields,
          required,
          validate,
          structure,
          topology,
          definition,
        ]
      x-codeSamples:
        - lang: TypeScript
          label: List the agenda's additional event fields
          source: |
            const { data, error } = await oa.agendas.events.schema({
              path: { agendaUid: 12345 },
            });
            if (error) throw error;
            return data.fields
              .filter((f) => f.schemaId != null)
              .map((f) => ({ name: f.field, type: f.fieldType }));
      description: >
        Returns the agenda's **merged event form schema** — the dynamic
        contract the events of this agenda follow. It merges the platform's
        native event fields with the network's and the agenda's own
        declarations: an agenda can add its own additional fields and override
        natives (make one required, restrict its options, relabel it). This is
        the same schema the OpenAgenda UI uses to build the event form: use it
        to know which fields exist, which are required and what
        their options are — e.g. to build payloads for the (upcoming) event
        write operations, to interpret `additionalFields` on events, or to
        discover the agenda-specific facets of the facets endpoint.


        Descriptors are scoped to your read access: a field whose `read` access
        levels restrict it (e.g. a moderator-only field) is part of the
        organiser's internal structure, so its descriptor is omitted for callers
        that may not read it — a public caller sees only the public fields. This
        matches the facets endpoint and the per-field read access applied to
        event values.


        The descriptors follow the OpenAgenda form-schema vocabulary
        (`field`, `fieldType`, `label`, `options`, `optional`, …). The
        properties documented here are stable; descriptors may carry further
        engine-specific keys.
      security:
        - bearerAuth: []
        - oauth2:
            - events:read
      parameters:
        - $ref: '#/components/parameters/AgendaUid'
      responses:
        '200':
          description: The merged event form schema.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventFormSchema'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /me/agendas:
    get:
      operationId: me.agendas.list
      tags: [Me]
      summary: List the agendas you are a member of
      x-synonyms:
        [
          my agendas,
          memberships,
          my role,
          mine,
          which agendas,
          can I,
          permissions,
        ]
      x-codeSamples:
        - lang: TypeScript
          label: Which agendas can I write to?
          source: |
            const { data, error } = await oa.me.agendas.list({});
            if (error) throw error;
            return data.data
              .filter((a) => a.role !== 'reader')
              .map((a) => ({ uid: a.uid, title: a.title, role: a.role }));
      description: >
        Returns a cursor-paginated list of the agendas the authenticated user
        is a member of, with their role on each. Private agendas the user
        belongs to ARE included (each item carries a `private` flag).


        By default items carry the `AgendaSummary` base fields; pass
        `detailed=true` to add `createdAt`, `network` and `locationSet`.


        Requires a user identity: a secret key (`oa_sk_…`) or an OAuth access
        token granted the `me:read` scope. A publishable key (`oa_pk_…`)
        carries no identity and is answered `401`.
      security:
        - bearerAuth: []
        - oauth2:
            - me:read
      parameters:
        - $ref: '#/components/parameters/AfterCursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Detailed'
      responses:
        '200':
          description: A page of the caller's agenda memberships.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeAgendaList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /agendas/{agendaUid}/locations:
    get:
      operationId: agendas.locations.list
      tags: [Locations]
      summary: List an agenda's locations
      x-synonyms: [venues, places, addresses, map, where, browse, all]
      x-codeSamples:
        - lang: TypeScript
          label: List the most recent locations
          source: |
            const { data, error } = await oa.agendas.locations.list({
              path: { agendaUid: 12345 },
              query: { limit: 20 },
            });
            if (error) throw error;
            return data.data.map((l) => ({ uid: l.uid, name: l.name }));
      description: >
        Returns a cursor-paginated list of the agenda's locations, newest
        first (insertion order — this matches creation date except for
        records whose `createdAt` was backfilled, e.g. imports preserving
        source dates). Pass the `after` cursor returned in `pagination.after`
        to fetch the next page; resend the same filters (they are not encoded
        in the cursor).


        By default items are the lighter `LocationSummary`; pass
        `detailed=true` for the full `Location` (the same shape as the
        single-location get).


        When the agenda shares its locations through a location set, the whole
        set is listed — including locations contributed by the other agendas
        of the set (their `setUid` carries the set's uid).


        Malformed filter values return `400`.
      security:
        - bearerAuth: []
        - oauth2:
            - locations:read
      parameters:
        - $ref: '#/components/parameters/AgendaUid'
        - $ref: '#/components/parameters/AfterCursor'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Detailed'
        - $ref: '#/components/parameters/LocationSearch'
        - $ref: '#/components/parameters/LocationFilterUid'
        - $ref: '#/components/parameters/LocationFilterExtId'
        - $ref: '#/components/parameters/LocationBoundingBox'
        - $ref: '#/components/parameters/FilterCreatedAt'
        - $ref: '#/components/parameters/FilterUpdatedAt'
      responses:
        '200':
          description: A page of locations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /agendas/{agendaUid}/locations/{locationUid}:
    get:
      operationId: agendas.locations.get
      tags: [Locations]
      summary: Get a location
      x-synonyms: [venue, place, address, detail]
      x-codeSamples:
        - lang: TypeScript
          label: Fetch one location
          source: |
            const { data, error } = await oa.agendas.locations.get({
              path: { agendaUid: 12345, locationUid: 67890 },
            });
            if (error) throw error;
            return data;
      description: >
        Returns a single location of the agenda (or of its shared location
        set) in the full `Location` shape.


        A location that was merged into another one answers `404` with the
        machine-readable code `merged` and the surviving location's uid in
        `error.details.mergedIn` — use it to repair stale references. Any
        other deleted or unknown uid is a plain `404` with code `not_found`.
      security:
        - bearerAuth: []
        - oauth2:
            - locations:read
      parameters:
        - $ref: '#/components/parameters/AgendaUid'
        - $ref: '#/components/parameters/LocationUid'
      responses:
        '200':
          description: The location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: >
            Agenda or location not found — or location merged into another
            one (`code: merged`, surviving uid in `details.mergedIn`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                merged:
                  summary: Location merged into another one
                  value:
                    error:
                      code: merged
                      message: location merged into another location
                      details:
                        mergedIn: 11111111
                notFound:
                  summary: Unknown location
                  value:
                    error:
                      code: not_found
                      message: location not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >
        API key sent as a Bearer token. Use a publishable read-only key
        (`oa_pk_…`, safe in browsers) for reads, or a secret key (`oa_sk_…`)
        for reads and writes.
    oauth2:
      type: oauth2
      description: >
        OAuth2 authorization code flow with PKCE (OAuth 2.1). Interactive
        clients redirect the user to the OpenAgenda authorization server to sign
        in and consent; the issued short-lived access token carries the granted
        scopes. PKCE (`S256`) is mandatory and public clients hold no secret.

        For machine-to-machine access, use an API key as a Bearer token instead
        (see `bearerAuth`).
      flows:
        authorizationCode:
          authorizationUrl: https://openagenda.com/api/auth/oauth2/authorize
          tokenUrl: https://openagenda.com/api/auth/oauth2/token
          refreshUrl: https://openagenda.com/api/auth/oauth2/token
          scopes:
            me:read: >-
              List the caller's agenda memberships and their role on each.
            agendas:read: Read agendas
            agendas:write: Create and modify agendas
            events:read: Read events
            events:write: Create and modify events
            locations:read: Read locations
            locations:write: Create and modify locations
            members:read: Read members
            members:write: Manage members

  parameters:
    AgendaUid:
      name: agendaUid
      in: path
      required: true
      description: Numeric uid of the agenda.
      schema:
        type: integer
        format: int64
    EventUid:
      name: eventUid
      in: path
      required: true
      description: Numeric uid of the event.
      schema:
        type: integer
        format: int64
    AfterCursor:
      name: after
      in: query
      required: false
      description: >
        Opaque pagination cursor returned in `pagination.after` of the previous
        page. Omit it to fetch the first page.
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of items to return per page.
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    Detailed:
      name: detailed
      in: query
      required: false
      description: >
        When `true`, each item in `data` is returned in its detailed
        representation, including the detailed-only fields. When `false` (the
        default), items are the lighter summary representation.
      schema:
        type: boolean
        default: false

    AgendaSearch:
      name: search
      in: query
      required: false
      description: >
        Full-text search across agenda title and description. Wrap the value in
        double quotes for an exact phrase match.
      schema:
        type: string

    AgendaFilterUid:
      name: uid
      in: query
      required: false
      description: Restrict to these agenda uids. Repeat the parameter for multiple values.
      schema:
        type: array
        items:
          type: integer
          format: int64

    AgendaFilterSlug:
      name: slug
      in: query
      required: false
      description: Restrict to these agenda slugs. Repeat the parameter for multiple values.
      schema:
        type: array
        items:
          type: string

    AgendaFilterOfficial:
      name: official
      in: query
      required: false
      description: >
        Restrict to official agendas (`true`) or to non-official agendas
        (`false`). Omit to return both.
      schema:
        type: boolean

    LocationUid:
      name: locationUid
      in: path
      required: true
      description: Numeric uid of the location.
      schema:
        type: integer
        format: int64

    LocationSearch:
      name: search
      in: query
      required: false
      description: >
        Free-text search over the locations' name, address, city, region and
        department.
      schema:
        type: string

    LocationFilterUid:
      name: uid
      in: query
      required: false
      description: >
        Restrict to the given location uid(s). Repeat the parameter
        (`uid=123&uid=456`) for multiple values.
      style: form
      explode: true
      schema:
        type: array
        items:
          type: integer
          format: int64

    LocationFilterExtId:
      name: extId
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Match a location by an external identifier:
        `extId[key]=<system>&extId[value]=<id>`. Both parts are required.
      schema:
        type: object
        additionalProperties: false
        required: [key, value]
        properties:
          key:
            type: string
          value:
            type: string

    LocationBoundingBox:
      name: bbox
      in: query
      required: false
      description: >
        Restrict to locations within a bounding box, given as
        `west,south,east,north` in decimal degrees (WGS84). Example:
        `bbox=2.224,48.815,2.469,48.902`.
      schema:
        type: string
        pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?$'

    Facets:
      name: facets
      in: query
      required: true
      description: >
        Comma-separated list of facets to compute. Each returns an array of
        buckets over the filtered events, ordered by the facet's default
        ordering. Unknown facet names return `400`. Shapes by family: term facets
        yield `{ value, count }`; provenance (`originAgendas`, `sourceAgendas`)
        yields `{ agenda, count }`; `locations` yields
        `{ location: { uid, name }, count }` buckets (the uid feeds the
        `locationUid` filter); `geohash` yields geo cluster buckets
        (`{ value, count, latitude, longitude }`); `viewport` yields a single
        bounding box object (or `null`); `timespan` yields the earliest/latest
        event date as `{ first, last }` (or `null`); `timings` yields a date
        histogram as `{ value, count }` buckets (bucket width set by
        `timingsInterval`); `dateRanges` yields a **dense daily grid** of
        `{ value, count }` over a calendar month (one bucket per day, including
        zero-count days; month set by `month`); `additionalFields` yields, per
        agenda choice/boolean field, its option counts as
        `{ <field>: { label, values:[{ value, label, count }] } }` (fields named
        by `additionalFieldsKeys`, or all readable when omitted);
        `additionalFieldMetrics` yields, per agenda numeric field, summary stats
        as `{ <field>: { label, metrics:{ sum, avg, max, min } } }` (fields named
        by `additionalFieldMetricsKeys`). Both honor per-field read access.

        Bucket-list facets (the term, provenance and `locations` families)
        return the **top buckets by event count**, capped by `facetSize`
        (default 10, max 250) and overridable per facet with
        `facetSizes[<facet>]`; `facetSort` reorders them (`count` or `alpha`).
        There is no bucket pagination — past the cap, narrow the filter instead. `additionalFields` is exhaustive (one bucket
        per option). The
        fields, their option ids and their labels are the ones the agenda's
        event form schema declares (`GET /agendas/{agendaUid}/events/schema`).
      style: form
      explode: false
      schema:
        type: array
        minItems: 1
        items:
          type: string
          enum:
            - additionalFields
            - additionalFieldMetrics
            - cities
            - regions
            - departments
            - districts
            - countryCodes
            - keywords
            - languages
            - accessibilities
            - status
            - attendanceModes
            - originAgendas
            - sourceAgendas
            - locations
            - geohash
            - viewport
            - timespan
            - timings
            - dateRanges

    FacetSize:
      name: facetSize
      in: query
      required: false
      description: >
        Default maximum number of buckets for the bucket-list facets (the term,
        provenance and `locations` families), ordered by event count. Override
        a single facet with `facetSizes[<facet>]`. Out-of-range values are
        clamped; the other families (geohash, viewport, timespan, timings,
        dateRanges, `additionalFields`/`additionalFieldMetrics`) have their own
        bounded shapes and ignore it.
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 250

    FacetSizes:
      name: facetSizes
      in: query
      required: false
      description: >
        Per-facet override of `facetSize`, keyed by facet name
        (`facetSizes[cities]=50`). Precedence: per-facet override > `facetSize`
        > default (10). Only applies to bucket-list facets; values are clamped
        to [1, 250].
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: integer
          minimum: 1
          maximum: 250

    FacetSort:
      name: facetSort
      in: query
      required: false
      description: >
        Default ordering of the bucket-list facets. `count` (default) returns
        the most frequent buckets first; `alpha` returns the same top-`facetSize`
        buckets but ordered alphabetically by their display value (city/keyword
        name, location name, agenda title) for readable scanning. Override a
        single facet with `facetSorts[<facet>]`.
      schema:
        type: string
        default: count
        enum:
          - count
          - alpha

    FacetSorts:
      name: facetSorts
      in: query
      required: false
      description: >
        Per-facet override of `facetSort`, keyed by facet name
        (`facetSorts[cities]=alpha`). Precedence: per-facet override >
        `facetSort` > default (`count`).
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string
          enum:
            - count
            - alpha

    FacetMissing:
      name: facetMissing
      in: query
      required: false
      description: >
        Per-facet label for a synthetic bucket counting the filtered events that
        have **no value** for the facet's field (`facetMissing[district]=Unknown`
        adds an `{ value: "Unknown", count }` bucket). Honoured by the
        value-keyed term facets (cities, regions, departments, districts,
        countryCodes, keywords, languages, status, attendanceModes); ignored for
        the others (the provenance and `locations` families key on an encoded
        ref, so they carry no missing bucket). The bucket appears only when such
        events exist.
      style: deepObject
      explode: true
      schema:
        type: object
        additionalProperties:
          type: string

    GeohashZoom:
      name: geohashZoom
      in: query
      required: false
      description: >
        Clustering zoom level for the `geohash` facet (higher = finer grid, more
        clusters). Ignored unless `geohash` is requested.
      schema:
        type: integer
        default: 1
        minimum: 1

    TimingsInterval:
      name: timingsInterval
      in: query
      required: false
      description: >
        Bucket width for the `timings` date histogram. Ignored unless `timings`
        is requested; an unrecognized value falls back to `day`.
      schema:
        type: string
        default: day
        enum:
          - hour
          - day
          - week
          - month
          - year

    Month:
      name: month
      in: query
      required: false
      description: >
        Calendar month (`YYYY-MM`) the `dateRanges` facet buckets day-by-day.
        Defaults to the current month; an unrecognized value falls back to it.
        Ignored unless `dateRanges` is requested. Because it bounds the buckets
        by scoping the filtered set to that month, it also constrains any other
        facet requested in the same call.
      schema:
        type: string
        pattern: '^\d{4}-\d{2}$'

    AdditionalFieldsKeys:
      name: additionalFieldsKeys
      in: query
      required: false
      description: >
        Comma-separated agenda choice/boolean field names to compute the
        `additionalFields` facet on — the names the agenda's event form schema
        declares (`GET /agendas/{agendaUid}/events/schema`). Omit to get every
        such field readable at the caller's access level. An unknown or
        non-readable field name returns `400`. Ignored unless `additionalFields`
        is requested.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string

    AdditionalFieldMetricsKeys:
      name: additionalFieldMetricsKeys
      in: query
      required: false
      description: >
        Comma-separated agenda numeric field names to compute the
        `additionalFieldMetrics` facet on — the names the agenda's event form
        schema declares (`GET /agendas/{agendaUid}/events/schema`). Omit to get
        every numeric field readable at the caller's access level. An unknown or
        non-readable field name returns `400`. Ignored unless
        `additionalFieldMetrics` is requested.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string

    Sort:
      name: sort
      in: query
      required: false
      description: >
        Ordering of the results. Defaults to `timingsWithFeatured.asc`, or to
        `score` (relevance) when `search` is set and no `sort` is given.
      schema:
        type: string
        enum:
          - timings.asc
          - timingsWithFeatured.asc
          - lastTiming.asc
          - lastTimingWithFeatured.asc
          - updatedAt.asc
          - updatedAt.desc
          - location.name.asc
          - location.name.desc
          - location.city.asc
          - location.city.desc
          - score
        x-enum-descriptions:
          timings.asc: By event date, earliest first
          timingsWithFeatured.asc: By event date, featured events first
          lastTiming.asc: By last occurrence date, earliest first
          lastTimingWithFeatured.asc: By last occurrence, featured events first
          updatedAt.asc: Least recently updated first
          updatedAt.desc: Most recently updated first
          location.name.asc: By location name, A→Z
          location.name.desc: By location name, Z→A
          location.city.asc: By city, A→Z
          location.city.desc: By city, Z→A
          score: By search relevance (only meaningful with `search`)

    Search:
      name: search
      in: query
      required: false
      description: >
        Full-text search across title, description, keywords and address.
        Wrap the value in double quotes for an exact phrase match.
      schema:
        type: string

    RelevanceThreshold:
      name: threshold
      in: query
      required: false
      description: >
        Relevance score floor for `search` results, used to drop weakly-matching
        events from the long tail (e.g. a single query term buried in a long
        description). Ignored when `search` is not set.


        - `off` (default) — no score filtering; every match is returned.

        - `auto` — a dynamic cutoff derived from the score distribution of the
          current query: the largest relative drop ("elbow") in the top scores
          becomes the floor. It self-calibrates per query, adapting to rare vs
          common terms and small vs large agendas.

        - a non-negative number — an absolute minimum score. Relevance scores are
          not comparable across queries nor stable across reindexes, so a fixed
          value suits a single tuned query rather than general use; prefer `auto`.


        Filtering is consistent across the returned events, their `total`, and
        facet counts: the cutoff is an Elasticsearch `min_score`, applied during
        document collection, so the same trimmed set drives the hit list and the
        aggregations. Pass the same `threshold` to the facets endpoint to keep
        its counts aligned with the list.
      schema:
        # Quote the string barewords: unquoted `off` is coerced to boolean false
        # by YAML 1.1 tooling (PyYAML, some codegens), diverging from the runtime
        # string. (The server also accepts a falsy `false`/"false" as `off`.)
        default: 'off'
        oneOf:
          - type: string
            enum: ['off', 'auto']
          - type: number
            minimum: 0

    FilterUid:
      name: uid
      in: query
      required: false
      description: Restrict to these event uids. Repeat the parameter for multiple values.
      schema:
        type: array
        items:
          type: integer
          format: int64

    FilterSlug:
      name: slug
      in: query
      required: false
      description: Restrict to these event slugs. Repeat the parameter for multiple values.
      schema:
        type: array
        items:
          type: string

    FilterExtId:
      name: extId
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Match an event by an external identifier:
        `extId[key]=<system>&extId[value]=<id>`.
      schema:
        type: object
        additionalProperties: false
        required: [key, value]
        properties:
          key:
            type: string
          value:
            type: string

    FilterKeyword:
      name: keyword
      in: query
      required: false
      description: >
        Restrict to events tagged with these keywords. Repeating the parameter
        narrows the result set (AND semantics).
      schema:
        type: array
        items:
          type: string

    FilterLanguage:
      name: language
      in: query
      required: false
      description: Restrict to events in these languages (ISO 639-1 codes).
      schema:
        type: array
        items:
          type: string

    FilterAccessibility:
      name: accessibility
      in: query
      required: false
      description: Restrict to events offering these accessibility facilities.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/AccessibilityCode'

    FilterStatus:
      name: status
      in: query
      required: false
      description: Restrict to these statuses.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/EventStatus'

    FilterAttendanceMode:
      name: attendanceMode
      in: query
      required: false
      description: Restrict to these attendance modes.
      schema:
        type: array
        items:
          $ref: '#/components/schemas/AttendanceMode'

    FilterFeatured:
      name: featured
      in: query
      required: false
      description: Restrict to featured (`true`) or non-featured (`false`) events.
      schema:
        type: boolean

    FilterLocationUid:
      name: locationUid
      in: query
      required: false
      description: Restrict to events held at these location uids.
      schema:
        type: array
        items:
          type: integer
          format: int64

    FilterLocationExtId:
      name: locationExtId
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Match by a location external identifier:
        `locationExtId[key]=<system>&locationExtId[value]=<id>`.
      schema:
        type: object
        additionalProperties: false
        required: [key, value]
        properties:
          key:
            type: string
          value:
            type: string

    FilterRegion:
      name: region
      in: query
      required: false
      description: Restrict to events located in these regions.
      schema:
        type: array
        items:
          type: string

    FilterDepartment:
      name: department
      in: query
      required: false
      description: Restrict to events located in these departments.
      schema:
        type: array
        items:
          type: string

    FilterCity:
      name: city
      in: query
      required: false
      description: Restrict to events located in these cities.
      schema:
        type: array
        items:
          type: string

    FilterDistrict:
      name: district
      in: query
      required: false
      description: Restrict to events located in these districts.
      schema:
        type: array
        items:
          type: string

    FilterAdminLevel3:
      name: adminLevel3
      in: query
      required: false
      description: Restrict to events located in these level-3 administrative areas.
      schema:
        type: array
        items:
          type: string

    FilterAdminLevel5:
      name: adminLevel5
      in: query
      required: false
      description: Restrict to events located in these level-5 administrative areas.
      schema:
        type: array
        items:
          type: string

    FilterCountryCode:
      name: countryCode
      in: query
      required: false
      description: Restrict to events located in these countries (ISO 3166-1 alpha-2).
      schema:
        type: array
        items:
          type: string
          pattern: '^[A-Za-z]{2}$'

    FilterBoundingBox:
      name: bbox
      in: query
      required: false
      description: >
        Restrict to events whose location falls within a bounding box, given as
        `west,south,east,north` in decimal degrees (WGS84). Example:
        `bbox=2.224,48.815,2.469,48.902`.
      schema:
        type: string
        pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?,-?\d+(\.\d+)?$'

    FilterNear:
      name: near
      in: query
      required: false
      description: >
        Center of a proximity search, given as `latitude,longitude` in decimal
        degrees. Must be combined with `radius`.
      schema:
        type: string
        pattern: '^-?\d+(\.\d+)?,-?\d+(\.\d+)?$'

    FilterRadius:
      name: radius
      in: query
      required: false
      description: >
        Proximity radius in metres around `near`. Requires `near` to be set.
      schema:
        type: integer
        minimum: 1

    FilterOriginAgendaUid:
      name: originAgendaUid
      in: query
      required: false
      description: Restrict to events originally created in these agendas.
      schema:
        type: array
        items:
          type: integer
          format: int64

    FilterOriginAgendaOfficial:
      name: originAgendaOfficial
      in: query
      required: false
      description: Restrict to events whose origin agenda is official (`true`) or not (`false`).
      schema:
        type: boolean

    FilterSourceAgendaUid:
      name: sourceAgendaUid
      in: query
      required: false
      description: Restrict to events aggregated from these source agendas.
      schema:
        type: array
        items:
          type: integer
          format: int64

    FilterRelative:
      name: relative
      in: query
      required: false
      description: >
        Restrict by temporal position relative to now. Combine values (repeat
        the parameter) to widen the window: `passed`, `upcoming`, `current`.
      schema:
        type: array
        items:
          type: string
          enum: [passed, upcoming, current]

    FilterTimings:
      name: timings
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Restrict to events having a timing that begins within the range, as
        RFC 3339 date-times: `timings[gte]=…&timings[lte]=…`. For now-relative
        windows, prefer `relative`. Date-times must carry an explicit offset
        (e.g. `Z`); a bare date (`YYYY-MM-DD`) is read as UTC midnight.
      schema:
        type: object
        additionalProperties: false
        properties:
          gte:
            type: string
            format: date-time
          lte:
            type: string
            format: date-time

    FilterLocalTime:
      name: localTime
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Restrict to events with a timing starting within a daily time window,
        in minutes from local midnight: `localTime[gte]=480` (08:00) and/or
        `localTime[lte]=1200` (20:00).
      schema:
        type: object
        additionalProperties: false
        properties:
          gte:
            type: integer
            minimum: 0
            maximum: 1440
          lte:
            type: integer
            minimum: 0
            maximum: 1440

    FilterCreatedAt:
      name: createdAt
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Restrict by creation date, as RFC 3339 date-times:
        `createdAt[gte]=…&createdAt[lte]=…`. Date-times must carry an
        explicit offset (e.g. `Z`); a bare date (`YYYY-MM-DD`) is read as
        UTC midnight.
      schema:
        type: object
        additionalProperties: false
        properties:
          gte:
            type: string
            format: date-time
          lte:
            type: string
            format: date-time

    FilterUpdatedAt:
      name: updatedAt
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Restrict by last-update date, as RFC 3339 date-times:
        `updatedAt[gte]=…&updatedAt[lte]=…`. Useful for incremental sync.
        Date-times must carry an explicit offset (e.g. `Z`); a bare date
        (`YYYY-MM-DD`) is read as UTC midnight.
      schema:
        type: object
        additionalProperties: false
        properties:
          gte:
            type: string
            format: date-time
          lte:
            type: string
            format: date-time

    FilterAge:
      name: age
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Restrict to events whose intended audience age range overlaps the given
        bounds, in years: `age[gte]=7&age[lte]=12`.
      schema:
        type: object
        additionalProperties: false
        properties:
          gte:
            type: integer
            minimum: 0
          lte:
            type: integer
            minimum: 0

    FilterAdditionalFields:
      name: additionalFields
      in: query
      required: false
      style: deepObject
      explode: true
      description: >
        Filter on agenda-specific additional fields, addressed by field name:
        `additionalFields[<fieldName>]=<value>`. Available fields and their value
        types come from the agenda's event form schema
        (`GET /agendas/{agendaUid}/events/schema`). For numeric fields, use
        a range object:
        `additionalFields[<fieldName>][gte]=…&additionalFields[<fieldName>][lte]=…`.
      schema:
        type: object
        additionalProperties:
          x-additionalPropertiesName: fieldName

  responses:
    BadRequest:
      description: >
        Malformed request — an invalid `after` cursor, a malformed path
        identifier, or an unknown/malformed filter value. Per-field context is
        provided under `error.details`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: >-
        Missing or invalid credentials: no API key was supplied, the key is
        unknown, or the access token is expired. `error.code` is `unauthorized`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: >-
        Authenticated, but not allowed to access this resource. For a blacklisted
        account `error.code` is `forbidden`. For an OAuth2 access token that
        lacks the scope this operation declares, `error.code` is
        `insufficient_scope` and a `WWW-Authenticate: Bearer
        error="insufficient_scope", scope="<required>"` header names the missing
        scope (RFC 6750 §3.1). API-key callers are not scope-constrained.
      headers:
        WWW-Authenticate:
          description: >-
            Present on an `insufficient_scope` failure: the RFC 6750 Bearer
            challenge naming the scope the token must hold.
          required: false
          schema:
            type: string
          example: >-
            Bearer error="insufficient_scope", scope="events:read",
            error_description="the access token lacks the required scope"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: string
              description: Stable, machine-readable error code.
              examples:
                [
                  'not_found',
                  'unauthorized',
                  'forbidden',
                  'insufficient_scope',
                  'validation_error',
                ]
            message:
              type: string
              description: Human-readable explanation.
            details:
              type: object
              description: Optional structured context (e.g. per-field validation errors).
              additionalProperties: true

    Pagination:
      type: object
      required: [after, limit]
      additionalProperties: false
      example:
        after: eyJ1aWQiOjIzNDU2fQ
        limit: 20
        total: 342
      properties:
        after:
          type: [string, 'null']
          description: >
            Opaque cursor to fetch the next page (pass back as the `after`
            query parameter). Null when there are no more results.
        limit:
          type: integer
          description: The page size that was applied.
        total:
          type: integer
          description: >
            Total number of matching records. May be omitted when counting is
            too expensive.

    LocalizedString:
      type: object
      description: >
        A string localized per language (ISO 639-1 code). Common keys:
        fr, en, de, es, it, nl, br, oc.
      additionalProperties:
        type: string
        x-additionalPropertiesName: languageCode
      examples:
        - fr: 'Concert de jazz'
          en: 'Jazz concert'

    LocalizedStringArray:
      type: object
      description: A list of strings localized per language code (used for keywords).
      additionalProperties:
        type: array
        x-additionalPropertiesName: languageCode
        items:
          type: string

    Image:
      type: object
      description: Event image with its generated size variants.
      additionalProperties: false
      properties:
        filename:
          type: [string, 'null']
        base:
          type: [string, 'null']
          format: uri
          description: Base URL the variants are served from.
        credits:
          type: [string, 'null']
        size:
          type: [object, 'null']
          properties:
            width:
              type: [integer, 'null']
            height:
              type: [integer, 'null']
        variants:
          type: array
          description: Generated size variants of the image.
          items:
            type: object
            additionalProperties: false
            properties:
              type:
                type: string
              filename:
                type: string
              size:
                type: [object, 'null']
                properties:
                  width:
                    type: [integer, 'null']
                  height:
                    type: [integer, 'null']

    EventLocation:
      type: object
      description: >
        The denormalized location snapshot an event carries — a nullable
        subset captured at indexing time. The canonical, full record is the
        `Location` resource (`GET /agendas/{agendaUid}/locations/{locationUid}`,
        same `uid`).
      additionalProperties: false
      properties:
        uid:
          type: integer
          format: int64
          readOnly: true
        name:
          type: [string, 'null']
        address:
          type: [string, 'null']
        city:
          type: [string, 'null']
        region:
          type: [string, 'null']
        postalCode:
          type: [string, 'null']
        countryCode:
          type: [string, 'null']
          description: ISO 3166-1 alpha-2 country code.
        latitude:
          type: [number, 'null']
          format: double
        longitude:
          type: [number, 'null']
          format: double
        district:
          type: [string, 'null']
        department:
          type: [string, 'null']
        adminLevel3:
          type: [string, 'null']
        adminLevel5:
          type: [string, 'null']
        country:
          oneOf:
            - $ref: '#/components/schemas/LocalizedString'
            - type: 'null'
          description: Localized country label.
        timezone:
          type: [string, 'null']
          description: IANA time zone of the location.

    LocationSummary:
      type: object
      description: >
        Compact location representation returned by the list endpoint
        (`detailed: false`) — identity, coordinates and verification status
        only; fetch with `detailed=true` or the single-location get for the
        full record.


        Empty-as-empty rule: every field is always present; singular optional
        values are present as `null` when absent.
      additionalProperties: false
      example:
        uid: 67890
        name: Château des Lèbres
        address: Naves, 07140 Les Vans
        latitude: 44.388303
        longitude: 4.105528
        verified: true
      required:
        - uid
        - name
        - address
        - latitude
        - longitude
        - verified
      properties:
        uid:
          type: integer
          format: int64
          readOnly: true
        name:
          type: string
        address:
          type: [string, 'null']
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        verified:
          type: boolean
          description: Whether the location was verified by an agenda moderator.

    Location:
      type: object
      description: >
        Full location representation returned by the single-get endpoint and
        by the list when `detailed=true` — the canonical record (the events'
        embedded `EventLocation` is a nullable snapshot of it).


        Empty-as-empty rule: every field is always present. Collections are
        never null/omitted (arrays → `[]`, localized maps → `{}`); singular
        optional values are present as `null` when absent.
      additionalProperties: false
      example:
        uid: 67890
        slug: chateau-des-lebres_4421007
        setUid: null
        name: Château des Lèbres
        address: Naves, 07140 Les Vans
        city: Les Vans
        district: null
        region: Auvergne-Rhône-Alpes
        department: Ardèche
        adminLevel3: null
        adminLevel5: null
        postalCode: '07140'
        insee: '07334'
        countryCode: FR
        latitude: 44.388303
        longitude: 4.105528
        timezone: Europe/Paris
        description:
          fr: Ancienne maison forte des comtes du Roure.
        access: {}
        image: https://cdn.openagenda.com/main/locations/67890.jpg
        imageCredits: null
        website: http://www.domainedeslebres.com/
        email: null
        phone: '0475363414'
        links:
          - https://fr-fr.facebook.com/domainedeslebres/
        extIds:
          - key: legacy
            value: '4421007'
        additionalFields:
          tags:
            - id: 2
              label: Château, hôtel urbain, palais, manoir
        siret: null
        verified: true
        createdAt: '2017-10-30T14:21:07.000Z'
        updatedAt: '2019-04-29T15:40:33.000Z'
      required:
        - uid
        - slug
        - setUid
        - name
        - address
        - city
        - district
        - region
        - department
        - adminLevel3
        - adminLevel5
        - postalCode
        - insee
        - countryCode
        - latitude
        - longitude
        - timezone
        - description
        - access
        - image
        - imageCredits
        - website
        - email
        - phone
        - links
        - extIds
        - additionalFields
        - siret
        - verified
        - createdAt
        - updatedAt
      properties:
        uid:
          type: integer
          format: int64
          readOnly: true
        slug:
          type: string
          readOnly: true
        setUid:
          type: [integer, 'null']
          format: int64
          readOnly: true
          description: >
            Uid of the shared location set this location belongs to, or `null`
            when it belongs to a single agenda's own pool.
        name:
          type: string
        address:
          type: [string, 'null']
        city:
          type: [string, 'null']
        district:
          type: [string, 'null']
        region:
          type: [string, 'null']
        department:
          type: [string, 'null']
        adminLevel3:
          type: [string, 'null']
        adminLevel5:
          type: [string, 'null']
        postalCode:
          type: [string, 'null']
        insee:
          type: [string, 'null']
          description: INSEE code of the French municipality, when known.
        countryCode:
          type: [string, 'null']
          description: ISO 3166-1 alpha-2 country code.
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        timezone:
          type: [string, 'null']
          description: IANA time zone of the location.
        description:
          $ref: '#/components/schemas/LocalizedString'
        access:
          allOf:
            - $ref: '#/components/schemas/LocalizedString'
          description: >
            Localized practical information on how to reach the location.
        image:
          type: [string, 'null']
          description: Absolute URL of the location's image.
        imageCredits:
          type: [string, 'null']
        website:
          type: [string, 'null']
        email:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        links:
          type: array
          items:
            type: string
        extIds:
          type: array
          items:
            $ref: '#/components/schemas/LocationExtId'
        additionalFields:
          $ref: '#/components/schemas/LocationAdditionalFields'
        siret:
          type: [string, 'null']
          description: >-
            SIRET number (French establishment id) of the location's
            operator, when provided.
        verified:
          type: boolean
          description: Whether the location was verified by an agenda moderator.
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true

    LocationExtId:
      type: object
      description: >
        An external identifier mapping this location to a third-party system.
      additionalProperties: false
      properties:
        key:
          type: string
        value:
          type: [string, 'null']

    LocationAdditionalFields:
      type: object
      description: >
        Agenda-specific additional fields of the location. Today this carries
        a single `tags` key — the location's tags filtered against the tag set
        declared in the agenda's schema. As the platform converges legacy tags
        into real additional fields, agenda-defined keys will appear here
        (non-breaking).
      properties:
        tags:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              id:
                type: integer
              label:
                description: >
                  Display label of the tag — a plain string or a localized
                  map, as stored.
                oneOf:
                  - type: string
                  - $ref: '#/components/schemas/LocalizedString'
      additionalProperties:
        x-additionalPropertiesName: fieldName

    LocationList:
      type: object
      required: [data, pagination]
      additionalProperties: false
      properties:
        data:
          type: array
          description: >
            `LocationSummary` items by default, or full `Location` items when
            `detailed=true`.
          items:
            # Detailed branch FIRST: order is irrelevant to JSON Schema (the
            # branches are mutually exclusive) but the generated zod client
            # returns the first match and strips unknown keys — summary-first
            # would silently strip the detailed-only fields. Same rule on every
            # summary/detailed pair.
            oneOf:
              - $ref: '#/components/schemas/Location'
              - $ref: '#/components/schemas/LocationSummary'
        pagination:
          $ref: '#/components/schemas/Pagination'

    EventFormSchema:
      type: object
      required: [fields]
      # Served raw from the form engine: top-level keys beyond `fields` may
      # appear (engine vocabulary); only `fields` is contractual.
      additionalProperties: true
      properties:
        fields:
          type: array
          description: >
            Every field of the merged schema — native event fields (with any
            per-agenda overrides applied) and the agenda's/network's
            additional fields (`schemaId` non-null). Served complete: a
            field's `read` access levels gate the visibility of its VALUE on
            events, not the presence of its descriptor here.
          items:
            $ref: '#/components/schemas/FormSchemaField'

    FormSchemaField:
      type: object
      description: >
        A descriptor in the OpenAgenda form-schema vocabulary, served raw.
        Two kinds share the array: **data field descriptors** (carrying
        `field`, the key the value lives under on events) and **section
        separators** (`type: 'section'`, no `field` — structure the form into
        titled groups). The properties below are the stable core; descriptors
        may carry further engine-specific keys (conditions, display hints,
        sub-schemas such as `schema` on the `location` field, …).
      additionalProperties: true
      example:
        field: thematique
        fieldType: radio
        label: { fr: 'Thématique', en: 'Theme' }
        schemaId: 10522
        schemaType: agenda
        options:
          - id: 42
            value: concert
            label: { fr: 'Concert' }
      properties:
        field:
          type: string
          description: >
            Field name — the key the value is carried under on events. Absent
            on section separators.
        fieldType:
          type: string
          description: >
            Field kind in the form-schema vocabulary, e.g. `text`, `textarea`,
            `multilingual`, `radio`, `checkbox`, `select`, `number`, `date`,
            `image`, `link`, `abstract` (structural)…
        type:
          type: string
          description: >
            Descriptor kind marker — `section` for section separators; data
            fields usually omit it.
        slug:
          type: string
          description: Stable identifier of a section separator.
        label:
          description: Localized display label, when the descriptor carries one.
          oneOf:
            - $ref: '#/components/schemas/LocalizedString'
            - type: string
            - type: 'null'
        optional:
          type: boolean
          description: >
            `false` means the field is required (possibly a per-agenda
            override of a native field).
        display:
          description: Whether the field is shown on the form (default true).
        enable:
          type: boolean
          description: Whether the field is enabled (default true).
        enableWith:
          description: >
            The field is only active when another field has a value: either
            that field's name, or `{ field, value }` to require specific
            values (e.g. `onlineAccessLink` enabled when `attendanceMode` is
            online or mixed).
        optionalWith:
          description: >
            The field is only required when another field (same reference
            forms as `enableWith`) has a value.
        origin:
          type: [string, 'null']
          enum: [tags, categories, custom, null]
          description: >
            For converted legacy fields, what they were converted from.
        options:
          type: array
          description: Allowed choices for choice-like field kinds.
          items:
            type: object
            additionalProperties: true
            properties:
              id:
                type: integer
              value:
                type: string
              label:
                oneOf:
                  - $ref: '#/components/schemas/LocalizedString'
                  - type: string
        schemaId:
          type: [integer, 'null']
          description: >
            Identifier of the declaring agenda/network schema. Non-null marks
            an **additional field**; `null`/absent marks a native one.
        schemaType:
          type: [string, 'null']
          enum: [agenda, network, event, null]
          description: >
            Which level declared the field: `agenda`/`network` for additional
            fields, `event` for the platform's native event fields.

    MemberRole:
      type: string
      enum: [administrator, moderator, contributor, reader]
      x-enum-descriptions:
        administrator: Full control of the agenda, its settings and members
        moderator: Moderates contributed events and manages content
        contributor: Can contribute events to the agenda
        reader: Read-only member

    MeAgendaItem:
      type: object
      description: >
        An agenda the authenticated user is a member of: the AgendaSummary
        base fields plus the user's `role` and the agenda's `private` flag
        (private agendas the user belongs to are listed).


        Empty-as-empty rule: every field is always present; singular optional
        values are present as `null` when absent.
      additionalProperties: false
      example:
        uid: 12345
        slug: festival-des-lumieres
        title: Festival des Lumières
        description: La programmation du festival.
        image: https://cdn.openagenda.com/main/12345.jpg
        official: false
        private: false
        role: administrator
      required:
        - uid
        - slug
        - title
        - description
        - image
        - official
        - private
        - role
      properties:
        uid:
          type: integer
          format: int64
          readOnly: true
        slug:
          type: string
          readOnly: true
        title:
          type: [string, 'null']
        description:
          type: [string, 'null']
        image:
          type: [string, 'null']
        official:
          type: boolean
        private:
          type: boolean
        role:
          $ref: '#/components/schemas/MemberRole'

    MeAgendaItemDetailed:
      type: object
      description: >
        The `detailed=true` variant of `MeAgendaItem`: the membership item
        plus `createdAt`, `network` and `locationSet`.
      additionalProperties: false
      required:
        - uid
        - slug
        - title
        - description
        - image
        - official
        - private
        - role
        - createdAt
        - network
        - locationSet
      properties:
        uid:
          type: integer
          format: int64
          readOnly: true
        slug:
          type: string
          readOnly: true
        title:
          type: [string, 'null']
        description:
          type: [string, 'null']
        image:
          type: [string, 'null']
        official:
          type: boolean
        private:
          type: boolean
        role:
          $ref: '#/components/schemas/MemberRole'
        createdAt:
          type: [string, 'null']
          format: date-time
        network:
          $ref: '#/components/schemas/AgendaNetworkRef'
        locationSet:
          $ref: '#/components/schemas/AgendaLocationSetRef'

    MeAgendaList:
      type: object
      required: [data, pagination]
      additionalProperties: false
      properties:
        data:
          type: array
          description: >
            `MeAgendaItem` items by default, or `MeAgendaItemDetailed` items
            when `detailed=true`.
          items:
            # Detailed branch first — see LocationList for why.
            oneOf:
              - $ref: '#/components/schemas/MeAgendaItemDetailed'
              - $ref: '#/components/schemas/MeAgendaItem'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Timing:
      type: object
      required: [begin, end]
      additionalProperties: false
      properties:
        begin:
          type: string
          format: date-time
        end:
          type: string
          format: date-time

    AgeRange:
      type: [object, 'null']
      additionalProperties: false
      properties:
        min:
          type: [integer, 'null']
        max:
          type: [integer, 'null']

    Accessibility:
      type: [object, 'null']
      description: >
        Per-facility accessibility flags — `true` when the event offers that
        facility. The keys are the `AccessibilityCode` values.
      additionalProperties: false
      properties:
        hi:
          type: boolean
          description: Hearing impairment.
        ii:
          type: boolean
          description: Intellectual impairment.
        vi:
          type: boolean
          description: Visual impairment.
        pi:
          type: boolean
          description: Psychic impairment.
        mi:
          type: boolean
          description: Motor impairment.

    Registration:
      type: object
      description: A single way for attendees to register.
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [phone, email, link]
        value:
          type: string

    EnrichedLink:
      type: object
      additionalProperties: false
      properties:
        link:
          type: string
          format: uri
        data:
          type: object
          description: Optional enrichment metadata extracted from the link.
          additionalProperties: true

    AgendaRef:
      type: object
      description: A compact reference to an agenda.
      additionalProperties: false
      properties:
        uid:
          type: integer
          format: int64
        title:
          type: [string, 'null']
        slug:
          type: [string, 'null']
        image:
          type: [string, 'null']
        url:
          type: [string, 'null']
          format: uri
        official:
          type: [boolean, 'null']

    SourceAgendaRef:
      type: object
      description: >
        A source-agenda reference as carried by provenance facets. Narrower than
        AgendaRef: the search index only stores uid/title/image for source
        agendas (slug/url/official are not indexed for sources), so this type
        deliberately omits them. (On events, sourceAgendas use the full AgendaRef.)
      additionalProperties: false
      required: [uid]
      properties:
        uid:
          type: integer
          format: int64
        title:
          type: [string, 'null']
        image:
          type: [string, 'null']

    ExtId:
      type: object
      description: An external identifier mapping this event to a third-party system.
      additionalProperties: false
      properties:
        key:
          type: string
        value:
          type: string

    AdditionalFields:
      type: object
      description: >
        Agenda-specific additional fields. The available keys and the shape of
        each value are defined by the agenda's event form schema (see
        `GET /agendas/{agendaUid}/events/schema`). Each value follows its
        field's fieldType (text, choice, multilingual, …).
      additionalProperties:
        x-additionalPropertiesName: fieldName

    AgendaNetworkRef:
      type: [object, 'null']
      description: A compact reference to the network an agenda belongs to, or `null`.
      additionalProperties: false
      required: [uid, title]
      properties:
        uid:
          type: integer
          format: int64
        title:
          type: [string, 'null']

    AgendaLocationSetRef:
      type: [object, 'null']
      description: A compact reference to the location set bound to an agenda, or `null`.
      additionalProperties: false
      required: [uid, title]
      properties:
        uid:
          type: integer
          format: int64
        title:
          type: [string, 'null']

    AgendaSummary:
      type: object
      description: >
        Base agenda representation returned by the list endpoint by default
        (`detailed: false`). It is the search-index base projection — identity
        and display essentials only.


        The three agenda read shapes are distinct and reflect their source:
        `AgendaSummary` (list base) ⊂ `AgendaDetailed` (list `detailed=true`, the
        search-index detailed projection) and `Agenda` (the single-get, full SQL
        record).


        Empty-as-empty rule: every field is always present; singular optional
        values are present as `null` when absent. NOTE: unlike events, agenda
        `title`/`description` are plain strings, not localized maps.
      additionalProperties: false
      required:
        - uid
        - slug
        - title
        - description
        - image
        - official
      example:
        uid: 12345
        slug: festival-des-lumieres
        title: Festival des Lumières
        description: La programmation officielle du Festival des Lumières.
        image: https://cdn.openagenda.com/main/12345.jpg
        official: true
      properties:
        uid:
          type: integer
          format: int64
        slug:
          type: string
        title:
          type: string
        description:
          type: [string, 'null']
        image:
          type: [string, 'null']
          format: uri
          description: >
            Absolute URL of the agenda image, or `null`. (Scalar URL — not the
            structured `Image` type used by events; aligning the two is a
            planned backend follow-up.)
        official:
          type: boolean
          description: Whether the agenda is an official one. `null` is coerced to `false`.

    AgendaDetailed:
      type: object
      description: >
        Detailed agenda representation returned by the list endpoint when
        `detailed: true`. It is the search-index detailed projection: the
        `AgendaSummary` base set PLUS `createdAt`, `network` and `locationSet`.


        It is narrower than the single-get `Agenda`: the search index does not
        carry `url`, `updatedAt`, `officializedAt`, `private` or `indexed`, so
        those are only available by fetching a single agenda.
      additionalProperties: false
      required:
        - uid
        - slug
        - title
        - description
        - image
        - official
        - createdAt
        - network
        - locationSet
      properties:
        uid:
          type: integer
          format: int64
        slug:
          type: string
        title:
          type: string
        description:
          type: [string, 'null']
        image:
          type: [string, 'null']
          format: uri
          description: >
            Absolute URL of the agenda image, or `null`. (Scalar URL — not the
            structured `Image` type used by events; aligning the two is a
            planned backend follow-up.)
        official:
          type: boolean
          description: Whether the agenda is an official one. `null` is coerced to `false`.
        createdAt:
          type: string
          format: date-time
        network:
          $ref: '#/components/schemas/AgendaNetworkRef'
        locationSet:
          $ref: '#/components/schemas/AgendaLocationSetRef'

    Agenda:
      type: object
      description: >
        Full agenda representation returned by the single-get endpoint. The
        canonical record (SQL), with the richest field set: the base fields plus
        `url`, `createdAt`, `updatedAt`, `officializedAt`, `private`, `indexed`,
        `network` and `locationSet`.


        Empty-as-empty rule: every field is always present; singular optional
        values are present as `null` when absent.
      additionalProperties: false
      required:
        - uid
        - slug
        - title
        - description
        - image
        - official
        - url
        - createdAt
        - updatedAt
        - officializedAt
        - private
        - indexed
        - network
        - locationSet
      example:
        uid: 12345
        slug: festival-des-lumieres
        title: Festival des Lumières
        description: La programmation officielle du Festival des Lumières.
        image: https://cdn.openagenda.com/main/12345.jpg
        official: true
        url: https://openagenda.com/festival-des-lumieres
        createdAt: '2024-11-04T09:12:00+01:00'
        updatedAt: '2025-05-28T16:45:00+02:00'
        officializedAt: '2024-11-15T10:00:00+01:00'
        private: false
        indexed: true
        network:
          uid: 87
          title: Ville de Lyon
        locationSet:
          uid: 204
          title: Lieux de Lyon
      properties:
        uid:
          type: integer
          format: int64
        slug:
          type: string
        title:
          type: string
        description:
          type: [string, 'null']
        image:
          type: [string, 'null']
          format: uri
          description: >
            Absolute URL of the agenda image, or `null`. (Scalar URL — not the
            structured `Image` type used by events; aligning the two is a
            planned backend follow-up.)
        official:
          type: boolean
          description: Whether the agenda is an official one. `null` is coerced to `false`.
        url:
          type: [string, 'null']
          format: uri
          description: Public website URL of the agenda, or `null`.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        officializedAt:
          type: [string, 'null']
          format: date-time
          description: When the agenda was officialized, or `null` if it is not official.
        private:
          type: boolean
          description: Whether the agenda is private (not publicly listed).
