<!DOCTYPE html>
<html>
  <head>
    <title></title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <meta name="viewport" content="width=device-width, target-densityDpi=device-dpi, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"/>
    <!--[if IE]>
      <script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->
    <script type="text/javascript" src="../js/lib/common/common.js"></script>
    <script type="text/javascript" src="../js/lib/remote/remote.js"></script>
    <script type="text/javascript" src="../js/lib/lightbox/lightbox.js"></script>
    <script type="text/javascript" src="../js/lib/urlStrings/urlStrings.js"></script>
    <script type="text/javascript" src="../js/lib/hash/hash.js"></script>
    <script type="text/javascript" src="../js/lib/Base64/Base64.js"></script>
    <script type="text/javascript" src="../js/lib/EventHandler/EventHandler.js"></script>

    <script type="text/javascript" src="../js/vendors/ejs/src/ejs_production.js"></script>
    <script type="text/javascript" src="../js/vendors/spin/src/spin.min.js"></script>
    
    <script type="text/javascript" src="../js/cibul/handleLock/src/handleLock.js"></script>
    <script type="text/javascript" src="../js/cibul/handleNav/src/handleNav.js"></script>
    <script type="text/javascript" src="../js/cibul/handleList/src/handleList.js"></script>
    <script type="text/javascript" src="../js/cibul/handleContextMenu/src/handleContextMenu.js"></script>

    <script type="text/javascript" src="js/handleListPage.js"></script>

    <link rel="stylesheet" href="../css/global/global.css" type="text/css" />
    <link rel="stylesheet" href="../css/page structure/page.css" type="text/css" />
    <link rel="stylesheet" href="../css/page structure/elp.css" type="text/css" />
    <link rel="stylesheet" href="../css/rsli.css" type="text/css" />
    <link rel="stylesheet" href="../css/font-awesome/font-awesome.css" type="text/css" />
    
  </head>
  <body>

    <div class="cbody center js_program_results elp">
      <div class="wsq">
        <section class="main">
          <a class="list-nav js_nav_previous display-none"><span>...</span><i class="icon-arrow-up"></i></a>
          <ul class="js_list_content main-list"></ul>
          <div class="list-nav bottom display-none js_nav_next"><span>...</span><i class="icon-arrow-down"></i></div>
        </section>
      </div/>
    </div>
    
    <script type="text/javascript">

      addEvent(window, 'load', function() {

        handleListPage({
          url: 'http://d.openagenda.com/frontend_dev.php/home/program?format=jsonp',
          elems: {
            listCanvas: el('.js_list_content'),
            navNext: el('.js_nav_next'),
            navPrevious: el('.js_nav_previous')
          },
          templates: {
            program: [
              '<li class="mli"><div class="rw-item">',
                '<a class="rwi-pic" href="<%= url %>"><img alt="<%= title %>" src="<%= image %>"/></a>',
                '<div class="rwi-content">',
                  '<div class="rwi-title"><a href="<%= url %>"><%= title %></a></div>',
                  '<div class="rwi-description"><a href="<%= url %>"><%= description %></a></div>',
                  '<ul class="rwi-act">',
                    '<li class="js_follow"><a href="<%= follow %>"><i class="icon-arrow-right"></i></a></li>',
                    '<li class="js_unfollow display-none"><a href="<%= unfollow %>"><i class="icon-minus"></i></a></li>',
                    '<% if (typeof message !== \'undefined\' || typeof facebook !== \'undefined\' || typeof twitter !== \'undefined\') { %>',
                      '<% if (typeof message !== \'undefined\') { %><li><a href="<%= message %>"><i class="icon-envelope-alt"></i></a></li><% } %>',
                      '<% if (typeof facebook !== \'undefined\') { %><li><a href="<%= facebook %>" target="_blank"><i class="icon-facebook-sign"></i></a></li><% } %>',
                      '<% if (typeof twitter !== \'undefined\') { %><li><a href="<%= twitter %>" target="_blank"><i class="icon-twitter-sign"></i></a></li><% } %>',
                    '<% } %>',
                  '</ul>',
                '</div>',
              '</div></li>'
            ].join('')
          },
          debug: true
        });

      });

    </script>

  </body>
</html>
