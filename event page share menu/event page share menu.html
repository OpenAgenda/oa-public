<body>
<a class="js_colorbox">colorbox</a>
<div class="body window">
  <div class="page">


  
    <div id="event-share">
      <h1>Share the Event</h1>
      <form>
        <fieldset>
          <ul class="inline">
            <li><input type="checkbox"/><span>On my Cibul page</span></li>
            <li><input type="checkbox"/><span>On Facebook</span></li>
            <li><input type="checkbox"/><span>On Twitter</span></li>
          </ul>
        </fieldset>
        <fieldset>
          <a href="#" class="section-display showing js_trigger"><span class="deploy-arrow"></span><span>On a Program</span></a>
          <ul class="js_programs">
            <li>
              <input type="checkbox"/>
              <img class="pic-mini" src="images/review1.jpg"/>
              <span>La Fille du Rock</span>
            </li>
            <li>
              <input type="checkbox"/>
              <img class="pic-mini" src="images/review2.jpg"/>
              <span>Le Bouillon Belge</span>
            </li>
          </ul>
        </fieldset>
        <fieldset>
          <label class="infield">Comment</label>
          <textarea rows="4" cols="30"></textarea>
        </fieldset>
        <fieldset class="text-right">
          <input class="button small" type="submit" value="Share"/>
        </fieldset>
      </form>
      <script type="text/javascript">

        if (typeof c_box == 'undefined') var c_box = function(lightbox) {

          if (typeof p == 'undefined') p = 'body';

          if (typeof lightbox == 'undefined') lightbox = false;

          if (lightbox) p = '#colorbox';
          else p = 'body';

          $('.js_trigger', p).triggerShow(p + ' .js_programs', {onShow: function(){ if (lightbox) $.fn.colorbox.resize({innerWidth: $("#cboxLoadedContent").width()}) }, onHide: function(){ if (lightbox) $.fn.colorbox.resize({innerWidth: $("#cboxLoadedContent").width()}) }});
          $('textarea', p).infieldize();
        }

        $(function(){

          if (typeof $.initComplete == 'undefined')
          {
            $.initComplete = true;

            $('.js_colorbox').click(function(e){ e.preventDefault(); $.fn.colorbox({html: $('.page').html(), onComplete: function(){setTimeout(function(){c_box('#colorbox')}, 1)}, transition: 'none'}) });

            c_box();
          }
        });
      </script>
    </div>
  

  </div>

</div>
</body>
</html>
