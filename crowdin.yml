files:
  - source: /packages/*/src/locales/en.json
    translation: /%original_path%/%two_letters_code%.%file_extension%
    update_option: update_as_unapproved
  - source: /packages/labels/.crowdin/locales/*/*.en.json
    translation: /%original_path%/%original_file_name%.%two_letters_code%.%file_extension%
    update_option: update_as_unapproved
    translation_replace:
      - .en.json: ""

