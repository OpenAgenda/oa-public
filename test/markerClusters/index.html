<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <meta name="viewport" content="width=device-width, target-densityDpi=device-dpi, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"/>
    <title>marker clusters</title>
    <script type="text/javascript" src="http://maps.googleapis.com/maps/api/js?key=AIzaSyC7gMvxBpIDtORZHe1ajfiHBuj2HNdfJk4&sensor=false"></script>
    <script type="text/javascript" src="markerclusterer.js"></script>
    
    <script type="text/javascript" src="../../js/lib/common/common.js"></script>
    <style type="text/css">

      #map { width: 400px; height: 300px; }

    </style>

    <script type="text/javascript" src="leaflet.js"></script>
    <script src="leaflet.markercluster-src.js"></script>

    <link rel="stylesheet" href="leaflet.css" />
    <link rel="stylesheet" href="MarkerCluster.css" />
    <link rel="stylesheet" href="MarkerCluster.Default.css" />

  </head>
  <body>

    <div id="map"></div>

    <script type="text/javascript">

      // https://developers.google.com/maps/articles/toomanymarkers#markerclusterer

      var markerCount = 10000
      , positions = [], markers = []
      , refPos = [48.86336,2.342091]
      , tlPos = [48.892712,2.279263]
      , blPos = [48.819072,2.410755]
      , latSpan = Math.abs(tlPos[0] - blPos[0])
      , lngSpan = Math.abs(tlPos[1] - blPos[1]);

      // https://developers.google.com/maps/articles/toomanymarkers

      addEvent(window, 'load', function() {

        while (markerCount--)
          positions.push([tlPos[0] - Math.random()*latSpan, tlPos[1] + Math.random()*lngSpan]);

        doGoogle(positions);

        //doLeaflet(positions);

      });

      var doGoogle = function(positions) {

        var map = new google.maps.Map(el('#map'), {
          center: new google.maps.LatLng(refPos[0],refPos[1]),
          zoom: 12
        });

        forEach(positions, function(pos) {
          markers.push(new google.maps.Marker({
            position: new google.maps.LatLng(pos[0], pos[1])
          }));
        });

        new MarkerClusterer(map, markers);

      },

      doLeaflet = function(positions) {

        var map = L.map('map').setView(refPos, 13);

        L.tileLayer('http://{s}.tile.osm.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var markers = new L.MarkerClusterGroup();

        forEach(positions, function(pos) {
          markers.addLayer(L.marker(pos));
        });

        map.addLayer(markers);

      };

    </script>
  </body>
</html>
