          <form class="js_header_search">
            <ul>
              <li>
                <label class="infield">Quoi</label>
                <input type="text" class="in-field js_what_input js_deploy"/>
                <div class="overlay-menu js_what what-menu js_overlay wsq">
                  <div class="widget">
                    <a class="js_what_tag">concert</a>,

                    <a class="js_what_tag">exhibition</a>,

                  </div>
                </div>
              </li>
              <li>
                <label class="infield">Quand</label>
                <input type="text" class="in-field js_when_input js_deploy"/>

                  <div class="overlay-menu-content">
                    <div class="widget js_calendar"></div>
                  </div>
                </div>
              </li>
              <li>
                <label class="infield">Où</label>
                <input type="text" class="in-field js_where_input js_deploy"/>

                  <input class="js_latitude_field" type="hidden"/>
                  <input class="js_longitude_field" type="hidden"/>
                  <input class="js_radius_field" type="hidden"/>
                  <div class="occupied js_occupied load-icon display-none"></div>
                  <div class="autolocate">
                    <a class="js_nav_locate" href="#">me localiser</a>
                  </div>
                  <div class="js_event_anchor where-list"></div>
                </div>
              </li>
            </ul>
          </form>
          <div class="visitor block js_connect js_not_logged">
            <a class="js_dropdown_trigger js_language lang-link sub-block"><i class="icon-flag head-icon"></i><span class="small-black-down-arrow-css"></span></a>
            <div class="header-dropdown js_language_list">
              <div class="wsq">
                <ul>
                  <li><a class="js_head_fr js_page_redirect" href="#">français</a></li>
                  <li><a class="js_head_en js_page_redirect" href="#">english</a></li>
                  <li><a class="js_head_it js_page_redirect" href="#">italiano</a></li>
                </ul>
              </div>
            </div>

                  </form>
                </div>
