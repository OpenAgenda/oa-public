upstream mcp_upstream {
  zone mcp_upstream 64k;
  server mcp:8904 resolve;
  keepalive 2;
}

server {
  listen 443 ssl; # managed by Certbot

  server_name ${MCP_DOMAIN};

  ssl_certificate /ssl/mcp.cert.pem; # managed by Certbot
  ssl_certificate_key /ssl/mcp.key.pem; # managed by Certbot

  ${CLIENT_SSL_NGINX_CONF}

  client_max_body_size 4m;

  # The whole subdomain is the MCP container: it routes internally GET / (landing),
  # POST /mcp (Streamable HTTP endpoint), and /.well-known/oauth-protected-resource/mcp
  # (PRM). A single location proxies everything to it.
  location / {
    # `always` so the headers survive non-2xx/3xx responses too. Without it nginx
    # drops add_header on the 401 + WWW-Authenticate challenge (and on 405/500),
    # so a browser MCP client's cross-origin fetch can't read WWW-Authenticate and
    # OAuth discovery fails. (Claude Code, non-browser, is unaffected either way.)
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization,Content-Type,Mcp-Session-Id,Mcp-Protocol-Version,Accept' always;
    add_header 'Access-Control-Expose-Headers' 'WWW-Authenticate,Mcp-Session-Id' always;

    proxy_pass http://mcp_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # MCP Streamable HTTP is POST + an SSE *response* — it never does a WebSocket
    # Upgrade. Forwarding `Connection: $connection_upgrade` would send
    # `Connection: close` on every normal request (empty Upgrade → "close"),
    # which poisons the `keepalive` upstream pool: nginx pools the connection but
    # the upstream closed it, so every other reused connection 400s. Clear the
    # Connection header instead — the canonical recipe for a keepalive upstream.
    proxy_set_header Connection "";
    # SSE responses stream incrementally → no buffering, long read timeout.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }
}
