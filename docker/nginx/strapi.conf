upstream strapi_upstream {
  zone strapi_upstream 64k
  server strapi:${STRAPI_PORT} resolve;
  keepalive 2;
}

upstream strapi_admin_api_upstream {
  zone strapi_admin_api_upstream 64k;
  server strapi:${STRAPI_ADMIN_API_PORT} resolve;
  keepalive 2;
}

server {
  listen 443 ssl;
  server_name ${STRAPI_DOMAIN};

  ssl_certificate /ssl/strapi.cert.pem; # managed by Certbot
  ssl_certificate_key /ssl/strapi.key.pem; # managed by Certbot

  location / {
    proxy_pass http://strapi_upstream;
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_pass_request_headers on;
  }
}

server {
  server_name ${STRAPI_DOMAIN};
  listen ${STRAPI_ADMIN_API_PORT} ssl;

  ssl_certificate /ssl/strapi.cert.pem; # managed by Certbot
  ssl_certificate_key /ssl/strapi.key.pem; # managed by Certbot

  location / {
    proxy_pass http://strapi_admin_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host $http_host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_pass_request_headers on;
  }
}
