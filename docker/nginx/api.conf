upstream api_upstream {
  zone api_upstream 64k;
  server node:8902 resolve;
  keepalive 2;
}

server {
  listen 443 ssl; # managed by Certbot

  server_name ${API_DOMAIN};

  ssl_certificate /ssl/api.cert.pem; # managed by Certbot
  ssl_certificate_key /ssl/api.key.pem; # managed by Certbot

  ${CLIENT_SSL_NGINX_CONF}

  client_max_body_size 20m;

  location /v2 {
    add_header 'Access-Control-Allow-Origin' '*';
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';

    proxy_pass http://api_upstream;
    proxy_set_header Host $host;
    proxy_set_header   X-Real-IP        $remote_addr;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location /v3 {
    # CORS lives here (edge), as for /v2. Three additions over the base policy let
    # an in-browser API explorer (Scalar docs) run authenticated requests:
    #   1. `Authorization` in Allow-Headers — a Bearer credential (API key or
    #      OAuth token) makes the request non-simple, so the browser preflights
    #      and checks this list. `Authorization` is never covered by a wildcard,
    #      it must be named explicitly.
    #   2. An explicit OPTIONS → 204 short-circuit — the v3 app answers OPTIONS
    #      with 404 (its catch-all shadows Express's auto-OPTIONS), and a non-2xx
    #      preflight fails regardless of headers. Answer it at the edge instead.
    #   3. `always` — so the headers ride 4xx too; a 401/403 body stays readable
    #      in the explorer instead of surfacing as an opaque network error.
    # Anonymous simple GETs (the prior behaviour) are unaffected.
    if ($request_method = OPTIONS) {
      add_header 'Access-Control-Allow-Origin' '*';
      add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'Authorization,DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
      add_header 'Access-Control-Max-Age' 600;
      add_header 'Content-Length' 0;
      return 204;
    }

    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization,DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

    proxy_pass http://api_upstream;
    proxy_set_header Host $host;
    proxy_set_header   X-Real-IP        $remote_addr;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }
}
