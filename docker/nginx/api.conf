server {
  listen 443 ssl; # managed by Certbot

  server_name ${API_DOMAIN};

  ssl_certificate /ssl/api.cert.pem; # managed by Certbot
  ssl_certificate_key /ssl/api.key.pem; # managed by Certbot

  ${CLIENT_SSL_NGINX_CONF}

  root /cibulapi-symfony/web;

  location ~ ^/(index)\.php$ {
    access_log /var/log/nginx/access-php.log main;

    fastcgi_split_path_info ^(.+\.php)(.*)$;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    fastcgi_pass   php:9000;
    include        fastcgi_params;
  }

  location /v2 {
    add_header 'Access-Control-Allow-Origin' '*';
    add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
    add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range';

    proxy_pass http://node:8902;
    proxy_set_header Host $host;
    proxy_set_header   X-Real-IP        $remote_addr;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_buffering off;
  }

  location / {
    index index.php;
    try_files $uri /index.php?$args;
  }
}
