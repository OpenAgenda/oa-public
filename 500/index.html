<!DOCTYPE html>
<html>
<head>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
  <link rel="stylesheet" type="text/css" href="500.css">
  <title>Cibul 500</title>
</head>
<body onload="onload()">
  <main class="front">
    <header>
      <img src="//cibulstatic.s3.amazonaws.com/biglogo.png" alt="logo">
      <h1 class="title">500</h1>
    </header>
    <section>
      <div class="content">
        <div class="desc w60">
          <div class="desc-content">
            <h2 class="title js_text" data-fr="Oups.">Oops.</h2>
            <p class="subtitle js_text" data-fr="Quelque chose ne s'est pas très bien passé.">Something went wrong.</p>
            <p><span class="js_text" data-fr="Une enquête a été lancée. Si vous voulez nous contacter pour nous donner quelques indices, envoyez un mail à ">An investigation has been launched. If you want to contact us on this matter, drop us a line at </span><a class="url" href="mailto:admin@cibul.net">admin@cibul.net</a></p>
          </div>
        </div><!--
      --><a class="ill w40">
          <img src="//cibulstatic.s3.amazonaws.com/505-2cv.jpg" alt="broken down">
        </a>
      </div>
    </section>
    <section>
      <div class="content center">
        <p class="subtitle js_text" data-fr="Nous sommes vraiment, vraiment désolés pour le dérangement.">We are deeply, deeply sorry for the inconvenience.</p>
        <a class="url" href="//cibul.net"><span class="js_text" data-fr="retour à la page d'accueil">back to the homepage</span><span> &rarr;</span></a>
      </div>
    </section>
  </main>
  <script type="text/javascript">

    function els(node, selector) {

      if (typeof node == 'string') {
        selector = node;
        node = document;
      }

      var prefix = selector.substr(0,1);

      if ('.#,'.indexOf(prefix) !== -1) selector = selector.substr(1);

      if (prefix == '.')
        return getElementsByClassName(node, selector);
      else if (prefix == '#') {
        var result = node.getElementById(selector);
        if (result)
          return [result];
        else
          return [];
      }
      else
        return node.getElementsByTagName(selector);

    };

    function getElementsByClassName(node, classname) {
      if (typeof node == 'string') {
        classname = node;
        node = document;
      };
      var a = [];
      var re = new RegExp('(^| )'+classname+'( |$)');
      var els = node.getElementsByTagName("*");
      for(var i=0,j=els.length; i<j; i++)
          if(re.test(els[i].className))a.push(els[i]);
      return a;
    };

    function forEach(array, action) {
      for (var i = 0; i < array.length; i++)
        action(array[i]);
    }

    function onload() {

      try {
        if (JSON.parse(localStorage.getItem('cibul_session')).culture !== 'fr') return;
      } catch (e) {
        return;
      }

      forEach(els('.js_text'), function(elem) {

        elem.innerHTML = elem.getAttribute('data-fr');

      });

    };

  </script>
</body>
</html>
