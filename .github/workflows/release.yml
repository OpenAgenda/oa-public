name: Release

on:
  push:
    paths:
      - '.changeset/**'
      - 'packages/**'
      - 'public/**'
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_commit_sha:
        description: 'Optional: The SHA of the release commit to synchronize manually'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production

    # Only trigger on pushes to the main branch or manually
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Add public remote
        run: |
          git remote add oa-public "https://github.com/OpenAgenda/oa-public.git" || true

      - name: Install
        uses: ./.github/composite-actions/install
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          font-awesome-npm-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

      - name: Build
        run: yarn turbo prepack

      - name: Create release Pull Request or publish to NPM
        id: changesets
        uses: changesets/action@v1
        with:
          publish: yarn changeset publish
          commit: 'chore: version packages'
          setupGitUser: false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload NPM Debug Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*.log
          retention-days: 1

      - name: Sync to public
        # Run even if `changeset publish` exited non-zero: a single package
        # failing to publish must not strand the public mirror. The action sets
        # its outputs before propagating the exit code, and this script is
        # idempotent (it only syncs tags missing from oa-public).
        if: ${{ !cancelled() }}
        run: |
          git checkout main
          ./scripts/sync-releases-to-public.sh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Attach the one-click Claude Desktop bundle (openagenda.mcpb) to the
      # just-created public release. The manifest `version` is rewritten to the
      # published npm version (same jq pattern as server.json below) so Desktop
      # shows the release version; the bundle stays a thin `npx @openagenda/mcp`
      # launcher, so it always pulls that version's code from npm at runtime.
      - name: Attach Claude Desktop bundle to the public release
        # `!cancelled()` so a partial publish failure on an unrelated package
        # doesn't skip this; the publishedPackages gate still scopes it to a real
        # mcp publish (outputs are set even when the publish step exits non-zero).
        if: ${{ !cancelled() && steps.changesets.outputs.published == 'true' && contains(fromJSON(steps.changesets.outputs.publishedPackages).*.name, '@openagenda/mcp') }}
        working-directory: public/mcp
        run: |
          VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "@openagenda/mcp") | .version')
          jq --arg v "$VERSION" '.version = $v' mcpb/manifest.json > mcpb/manifest.tmp
          mv mcpb/manifest.tmp mcpb/manifest.json
          yarn pack:mcpb
          gh release upload "@openagenda/mcp@$VERSION" openagenda.mcpb --repo openagenda/oa-public --clobber
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Mirror a freshly published @openagenda/mcp release to the official MCP
      # registry (https://registry.modelcontextprotocol.io). The registry only
      # hosts metadata: public/mcp/server.json, with its versions aligned on the
      # npm version that was just published (jq rewrite — server.json stays
      # authoritative for everything but the version). DNS authentication binds
      # the com.openagenda/* namespace; the Ed25519 private key lives in the
      # MCP_PUBLISHER_PRIVATE_KEY secret and must match the TXT record on
      # openagenda.com (runbook: wiki/mcp-registry.md).
      - name: Publish to MCP Registry
        # See "Attach Claude Desktop bundle": run on partial failure too, gated
        # on a real mcp publish — npm and the MCP registry should never diverge.
        if: ${{ !cancelled() && steps.changesets.outputs.published == 'true' && contains(fromJSON(steps.changesets.outputs.publishedPackages).*.name, '@openagenda/mcp') }}
        working-directory: public/mcp
        run: |
          VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "@openagenda/mcp") | .version')
          jq --arg v "$VERSION" '.version = $v | (.packages[]?.version) = $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login dns --domain openagenda.com --private-key "$MCP_PUBLISHER_PRIVATE_KEY"
          ./mcp-publisher publish
          rm -f mcp-publisher
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          MCP_PUBLISHER_PRIVATE_KEY: ${{ secrets.MCP_PUBLISHER_PRIVATE_KEY }}

      # Publish the freshly built widgets bundle to the CDN. Gated on a real
      # @openagenda/widgets publish so a release that doesn't bump widgets never
      # touches the CDN. The dist/ uploaded here is the one `yarn turbo prepack`
      # built above (same artefact npm published). The script uploads dist/ to
      # the OpenStack Swift `js` container and purges the KeyCDN `assets` zone.
      # Auth comes from two secrets: KEYCDN_API_KEY (instead of 1Password) and
      # OPENSTACK_RC — the full application-credential openrc, sourced here so the
      # region and endpoint are whatever that file declares (no hard-coded OS_*).
      # Kept LAST and blocking on purpose: a CDN failure is loud (red job, fix it
      # then re-run ./scripts/upload.sh locally) but never blocks the npm, sync or
      # mcp publishes that ran above.
      - name: Publish widgets to CDN
        # See "Attach Claude Desktop bundle": run on partial failure too, gated
        # on a real widgets publish.
        if: ${{ !cancelled() && steps.changesets.outputs.published == 'true' && contains(fromJSON(steps.changesets.outputs.publishedPackages).*.name, '@openagenda/widgets') }}
        working-directory: public/widgets
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-swiftclient python3-keystoneclient
          set -a; eval "$OPENSTACK_RC"; set +a
          ./scripts/upload.sh
        env:
          KEYCDN_API_KEY: ${{ secrets.KEYCDN_API_KEY }}
          OPENSTACK_RC: ${{ secrets.OPENSTACK_RC }}
