name: Release

on:
  push:
    paths:
      - '.changeset/**'
      - 'packages/**'
      - 'public/**'
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_commit_sha:
        description: 'Optional: The SHA of the release commit to synchronize manually'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    timeout-minutes: 15
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production

    # Only trigger on pushes to the main branch or manually
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.ref_name == 'main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Add public remote
        run: |
          git remote add oa-public "https://github.com/OpenAgenda/oa-public.git" || true

      - name: Install
        uses: ./.github/composite-actions/install
        with:
          npm-token: ${{ secrets.NPM_TOKEN }}
          font-awesome-npm-token: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

      - name: Build
        run: yarn turbo prepack

      - name: Create release Pull Request or publish to NPM
        id: changesets
        uses: changesets/action@v1
        with:
          publish: yarn changeset publish
          commit: 'chore: version packages'
          setupGitUser: false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload NPM Debug Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*.log
          retention-days: 1

      - name: Sync to public
        run: |
          git checkout main
          ./scripts/sync-releases-to-public.sh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # Mirror a freshly published @openagenda/mcp release to the official MCP
      # registry (https://registry.modelcontextprotocol.io). The registry only
      # hosts metadata: public/mcp/server.json, with its versions aligned on the
      # npm version that was just published (jq rewrite — server.json stays
      # authoritative for everything but the version). DNS authentication binds
      # the com.openagenda/* namespace; the Ed25519 private key lives in the
      # MCP_PUBLISHER_PRIVATE_KEY secret and must match the TXT record on
      # openagenda.com (runbook: wiki/mcp-registry.md).
      - name: Publish to MCP Registry
        if: steps.changesets.outputs.published == 'true' && contains(fromJSON(steps.changesets.outputs.publishedPackages).*.name, '@openagenda/mcp')
        working-directory: public/mcp
        run: |
          VERSION=$(echo "$PUBLISHED_PACKAGES" | jq -r '.[] | select(.name == "@openagenda/mcp") | .version')
          jq --arg v "$VERSION" '.version = $v | (.packages[]?.version) = $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login dns --domain openagenda.com --private-key "$MCP_PUBLISHER_PRIVATE_KEY"
          ./mcp-publisher publish
          rm -f mcp-publisher
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          MCP_PUBLISHER_PRIVATE_KEY: ${{ secrets.MCP_PUBLISHER_PRIVATE_KEY }}
