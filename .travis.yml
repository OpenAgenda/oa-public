language: node_js

node_js:
  - '10'
  - '8'

sudo: false

install: yarn

before_install:
  - openssl aes-256-cbc -k "$secret_password" -in secrets.tar.enc -out secrets.tar -d
  - tar xvf secrets.tar
  - curl -o- -L https://yarnpkg.com/install.sh | bash
  - export PATH="$HOME/.yarn/bin:$PATH"

cache:
  yarn: true
  directories:
    - 'node_modules'

services:
  - redis-server

script:
  - yarn test --runInBand

after_success:
  - yarn codecov

notifications:
  email: false

env:
  global:
    secure: 
