name: oa

services:
  nginx:
    container_name: nginx
    image: nginx:1.29.2
    restart: always
    ports:
      - 80:80
      - 443:443
      - 5173:5173
    env_file: .env
    volumes:
      - ./docker/nginx:/tmp/nginx
      - ${ASSETS_PATH}:/static
      - ${SITE_SSL_CERT}:/ssl/cert.pem
      - ${SITE_SSL_KEY}:/ssl/key.pem
      - ${API_SSL_CERT}:/ssl/api.cert.pem
      - ${API_SSL_KEY}:/ssl/api.key.pem
      - ${STRAPI_SSL_CERT}:/ssl/strapi.cert.pem
      - ${STRAPI_SSL_KEY}:/ssl/strapi.key.pem
      - ${CLIENT_SSL_CERT:-/dev/null}:/ssl/client.crt
      - ${ES_SSL_CERT:-/dev/null}:/ssl/es7.cert.pem
      - ${ES_SSL_KEY:-/dev/null}:/ssl/es7.key.pem
      - ${PMA_SSL_CERT:-/dev/null}:/ssl/pma.cert.pem
      - ${PMA_SSL_KEY:-/dev/null}:/ssl/pma.key.pem
      - ${ELASTICHQ_SSL_CERT:-/dev/null}:/ssl/elastichq.cert.pem
      - ${ELASTICHQ_SSL_KEY:-/dev/null}:/ssl/elastichq.key.pem
      - ${MAILPIT_SSL_CERT:-/dev/null}:/ssl/mailpit.cert.pem
      - ${MAILPIT_SSL_KEY:-/dev/null}:/ssl/mailpit.key.pem
    command: >
      /bin/bash -c
        "for filename in $$(find /tmp/nginx/ -type f -name '*'); do
          mkdir -p $$(dirname $${filename/\\/tmp\\/nginx/\\/etc\\/nginx});
          cat $$filename | envsubst \"`printf '$${%s} ' $$(bash -c \"compgen -A variable\")`\" > $${filename/\\/tmp\\/nginx/\\/etc\\/nginx\\/conf.d};
        done;
        /tmp/nginx/command.sh ${DEPLOY_ES_NGINX_PROXY:-0} ${DEPLOY_PMA_NGINX_PROXY:-0} ${DEPLOY_MAILPIT_NGINX_PROXY:-0} ${DEPLOY_ELASTICHQ_NGINX_PROXY:-0} ${DEPLOY_API_NGINX_PROXY:-0};
        nginx -g 'daemon off;'"
    links:
      - es7
      - node
      - phpmyadmin
      - mailpit
      - elastichq
      - strapi
    depends_on:
      - node

  strapi:
    container_name: strapi
    build:
      context: .
      dockerfile: docker/strapi/Dockerfile
      args:
        DOCKER_USER_ID: ${DOCKER_USER_ID}
        DOCKER_USER_GROUP_ID: ${DOCKER_USER_GROUP_ID}
    user: ${DOCKER_USER:-}
    command: yarn develop
    working_dir: /root
    volumes:
      - ./packages/strapi/.cache:/root/.cache
      - ./packages/strapi/.config:/root/.config
      - ./packages/strapi/config:/root/config
      - ./packages/strapi/database:/root/database
      - ./packages/strapi/favicon.png:/root/favicon.png
      - ./packages/strapi/package.json:/root/package.json
      - ./packages/strapi/public:/root/public
      - ./packages/strapi/src:/root/src
      - ./packages/strapi/.strapi-updater.json:/root/.strapi-updater.json
      - ./packages/strapi/tsconfig.json:/root/tsconfig.json
      - ./packages/strapi/types:/root/types
      - ./packages/strapi/yarn.lock-workspace:/root/yarn.lock
      - ${STRAPI_DATABASE_FILENAME}:/home/strapiuser/db.sqlite
    environment:
      HOST: ${STRAPI_HOST}
      PORT: ${STRAPI_PORT}
      SSL: ${STRAPI_SSL}
      DOMAIN: ${STRAPI_DOMAIN}
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN: ${STRAPI_TRANSFER_TOKEN}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      DATABASE_CLIENT: ${STRAPI_DATABASE_CLIENT}
      DATABASE_SSL: ${STRAPI_DATABASE_SSL}
      DATABASE_FILENAME: /home/strapiuser/db.sqlite
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_MAIN_PATH: ${S3_MAIN_PATH}
      S3_ROOT_PATH: ${STRAPI_S3_ROOT_PATH}
      S3_ASSETS_PATH: ${S3_ASSETS_PATH}
      S3_KEY: ${S3_KEY}
      S3_SECRET: ${S3_SECRET}
      S3_REGION: ${S3_REGION}
      S3_ASSETS_BUCKET: ${S3_ASSETS_BUCKET}

  node:
    container_name: node
    build:
      context: .
      dockerfile: docker/Dockerfile
    user: ${DOCKER_USER:-}
    working_dir: /root/oa
    command: >
      /root/oa/node_modules/.bin/concurrently -n "node,next" \
      "yarn workspace cibul-node ${NODE_YARN_COMMAND:-start}" \
      "yarn workspace @openagenda/next dev"
    restart: always
    volumes:
      - .:/root/oa
      - ${MYSQL_SSL_CA:-/dev/null}:/ssl/db-ca.pem
      - ${MYSQL_SSL_CERT:-/dev/null}:/ssl/db-cert.pem
      - ${MYSQL_SSL_KEY:-/dev/null}:/ssl/db-key.pem
      - ${REPO_SSL_CLIENT}:/root/.ssh/id_rsa
      - ${CLIENT_SSL_KEY:-/dev/null}:/root/.ssh/client.key
      - ${CLIENT_SSL_CERT:-/dev/null}:/root/.ssh/client.cert
    links:
      - mysql
      - redis
      - es7
      - mailpit
    depends_on:
      - mysql
      - redis
      - es7
      - strapi
    environment:
      TZ: Etc/UTC
      NODE_ENV: ${NODE_ENV}
      DEBUG_COLORS: ${DEBUG_COLORS}
      TERM: ${TERM}
      COLORTERM: ${COLORTERM}
      OA_NEXT_PORT: ${OA_NEXT_PORT}
      OA_API_PORT: ${OA_API_PORT}
      OA_SERVER_PORT: ${OA_SERVER_PORT}
      OA_USE_X_FWD_PROTO: 1
      OA_SUPERADMIN_UIDS: ${OA_SUPERADMIN_UIDS}
      DOMAIN: ${DOMAIN}
      DEBUG_INCLUDE_SPAN: ${DEBUG_INCLUDE_SPAN:-1}
      ROOT: ${ROOT}
      API_ROOT: ${API_ROOT}
      API_DOMAIN: ${API_DOMAIN}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_SSL_VERIFY: ${MYSQL_SSL_VERIFY}
      MYSQL_SSL_VERIFY_IDENTITY: ${MYSQL_SSL_VERIFY_IDENTITY}
      MYSQL_SSL_CA: /ssl/db-ca.pem
      MYSQL_SSL_KEY: /ssl/db-key.pem
      MYSQL_SSL_CERT: /ssl/db-cert.pem
      MYSQL_SSL_CA_STRING: ${MYSQL_SSL_CA_STRING:-}
      MYSQL_SSL_KEY_STRING: ${MYSQL_SSL_KEY_STRING:-}
      MYSQL_SSL_CERT_STRING: ${MYSQL_SSL_CERT_STRING:-}
      ES_HOST: ${ES_HOST}
      ES_PORT: ${ES_PORT:-9200}
      ES_USE_SSL: ${ES_USE_SSL}
      REDIS_CLUSTER_NODES: ${REDIS_CLUSTER_NODES}
      REDIS_PWD: ${REDIS_PWD}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_HOST: ${REDIS_HOST}
      AWS_KEY: ${AWS_KEY}
      AWS_SECRET: ${AWS_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_MAIN_BUCKET: ${AWS_MAIN_BUCKET}
      AWS_MAIN_PATH: ${AWS_MAIN_PATH}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_KEY: ${S3_KEY}
      S3_SECRET: ${S3_SECRET}
      S3_REGION: ${S3_REGION}
      S3_MAIN_BUCKET: ${S3_MAIN_BUCKET}
      S3_MAIN_PATH: ${S3_MAIN_PATH}
      S3_DOCX_PATH: ${S3_DOCX_PATH}
      S3_ASSETS_PATH: ${S3_ASSETS_PATH}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_HOST: ${MAIL_HOST}
      CLIENT_SSL_KEY: /root/.ssh/client.key
      CLIENT_SSL_CERT: /root/.ssh/client.cert
      OPENCAGE_KEY: ${OPENCAGE_KEY}
      IFRAMELY_KEY: ${IFRAMELY_KEY}
      MAILJET_KEY: ${MAILJET_KEY}
      MAILJET_SECRET: ${MAILJET_SECRET}
      MAILJET_CONTACTS_LIST_ID: ${MAILJET_CONTACTS_LIST_ID}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN}
      MAILGUN_KEY: ${MAILGUN_KEY}
      MAP_TILES: ${MAP_TILES}
      MATOMO_CLOUD_ID: ${MATOMO_CLOUD_ID}
      GOOGLE_ANALYTICS_ID: ${GOOGLE_ANALYTICS_ID}
      GOOGLE_ANALYTICS_EMBED_ID: ${GOOGLE_ANALYTICS_EMBED_ID}
      STATIC_MAP_TILES: ${STATIC_MAP_TILES}
      OA_SESSION_KEYS: ${OA_SESSION_KEYS}
      OA_SESSION_SECRET: ${OA_SESSION_SECRET}
      OA_OAUTH_GOOGLE_ID: ${OA_OAUTH_GOOGLE_ID}
      OA_OAUTH_GOOGLE_SECRET: ${OA_OAUTH_GOOGLE_SECRET}
      OA_FACEBOOK_ID: ${OA_FACEBOOK_ID}
      OA_FACEBOOK_SECRET: ${OA_FACEBOOK_SECRET}
      OA_PUBLIC_LOCKFILE: yarn.lock
      OA_DISCORD_CHANNEL: ${OA_DISCORD_CHANNEL}
      OA_DISCORD_TOKEN: ${OA_DISCORD_TOKEN}
      OA_DETECT_LOCATION_DUPLICATES: ${OA_DETECT_LOCATION_DUPLICATES}
      OA_DETECT_LOCATION_DUPLICATES_IGNORED_SET_UIDS: ${OA_DETECT_LOCATION_DUPLICATES_IGNORED_SET_UIDS}
      OA_DETECT_LOCATION_DUPLICATES_IGNORED_AGENDA_UIDS: ${OA_DETECT_LOCATION_DUPLICATES_IGNORED_AGENDA_UIDS}
      OA_DETECT_LOCATION_DUPLICATES_SLEEP: ${OA_DETECT_LOCATION_DUPLICATES_SLEEP}
      CRISP_WEBSITE_ID: ${CRISP_WEBSITE_ID}
      NEXT_API_INTERNAL_BASE_URL: ${NEXT_API_INTERNAL_BASE_URL}
      NEXT_PUBLIC_ASSET_PREFIX: ${NEXT_PUBLIC_ASSET_PREFIX}
      FONTAWESOME_NPM_AUTH_TOKEN: ${FONTAWESOME_NPM_AUTH_TOKEN}
      PASS_CULTURE_KEY: ${PASS_CULTURE_KEY}
      PASS_CULTURE_API: ${PASS_CULTURE_API}
      PASS_CULTURE_OFFER_LINK: ${PASS_CULTURE_OFFER_LINK}
      PASS_CULTURE_OFFER_EDIT_LINK: ${PASS_CULTURE_OFFER_EDIT_LINK}
      UNSUBSCRIPTIONS_SECRET: ${UNSUBSCRIPTIONS_SECRET}
      CRISP_IDENTIFIER: ${CRISP_IDENTIFIER}
      CRISP_KEY: ${CRISP_KEY}
      STRAPI_API_AUTH_TOKEN: ${STRAPI_API_AUTH_TOKEN}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OA_INSIGHT_OPS_API_KEY: ${OA_INSIGHT_OPS_API_KEY:-}
    ports:
      - 8903:8903
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  mysql:
    container_name: mysql
    image: mysql:8.0.33
    command: --default-authentication-plugin=mysql_native_password --require_secure_transport=${MYSQL_SECURE_TRANSPORT:-ON}
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - 3306:3306
    volumes:
      - ${MYSQL_CONFIG_PATH:-/dev/null}:/etc/mysql/conf.d/my.cnf
      - ${MYSQL_CONTAINER_DATA_PATH}:/var/lib/mysql
      - ${MYSQL_DUMP_FILE_PATH}:/docker-entrypoint-initdb.d/oa.sql

  redis:
    container_name: redis
    image: redis:7.0.11
    restart: always
    ports:
      - 6379:6379

  es7:
    container_name: es7
    build:
      context: ./docker/elasticsearch
    restart: always
    environment:
      - cluster.name=es-docker-cluster
      - bootstrap.memory_lock=true
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
      - 'http.host=0.0.0.0'
      - 'transport.host=127.0.0.1'
      - 'xpack.security.enabled=false'
      - cluster.routing.allocation.disk.watermark.low=10gb
      - cluster.routing.allocation.disk.watermark.high=5gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - 9200:9200

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin
    restart: always
    environment:
      PMA_HOST: ${MYSQL_HOST}
      # PMA_VERBOSE: 1
      PMA_SSL_KEY: /ssl/db-key.pem
      PMA_SSL_CERT: /ssl/db-cert.pem
      PMA_SSL_CA: /ssl/db-ca.pem
    volumes:
      - ./docker/phpmyadmin.config.php:/etc/phpmyadmin/config.user.inc.php
      - ${MYSQL_CONTAINER_DATA_PATH}/client-key.pem:/ssl/db-key.pem
      - ${MYSQL_CONTAINER_DATA_PATH}/client-cert.pem:/ssl/db-cert.pem
      - ${MYSQL_CONTAINER_DATA_PATH}/ca.pem:/ssl/db-ca.pem
    links:
      - mysql

  mailpit:
    container_name: mailpit
    image: axllent/mailpit
    restart: always
    ports:
      - 1025:1025
      - 8025:8025

  elastichq:
    container_name: elastichq
    image: elastichq/elasticsearch-hq
    restart: always
    environment:
      HQ_DEFAULT_URL: ${ELASTICHQ_CLIENT_URL:-http://es7:9200}
      HQ_ENABLE_SSL: ${ELASTICHQ_ENABLE_SSL:-True}
      CLIENT_KEY: /ssl/key.pem
      CLIENT_CERT: /ssl/cert.pem
      # HQ_DEBUG: "True"
    volumes:
      - ${ELASTICHQ_CLIENT_KEY:-/dev/null}:/ssl/key.pem
      - ${ELASTICHQ_CLIENT_CERT:-/dev/null}:/ssl/cert.pem
    links:
      - es7

  alloy-agent:
    container_name: alloy-agent
    image: grafana/alloy:v1.12.1
    restart: unless-stopped
    command: ['run', '/etc/alloy/config.alloy']
    environment:
      - OTEL_HOST=${OTEL_HOST}
      - ALLOY_DEPLOY_MODE=docker
    volumes:
      - ./docker/alloy-agent/config.alloy:/etc/alloy/config.alloy:ro
      - ./docker/alloy-agent/certs:/etc/alloy/certs:ro
      - /proc:/rootproc:ro
      - /var/run/docker.sock.raw:/var/run/docker.sock
      - /sys:/sys:ro
      - /:/rootfs:ro
      - /dev/disk/:/dev/disk:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/run:/var/run:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  esdata:
    driver: local

networks:
  default:
    enable_ipv6: true
