<!DOCTYPE html>
<html>
<head>
  <title>Testing unpack</title>
  <script type="text/javascript" src="unpack.js"></script>
</head>
<body onload="onload()">
  <script type="text/javascript">

    function onload() {

      // single backslash characters are escaped if in a single quote string. double quote escapes to itself
      unpack('"\\""');

      unpack('"\'"');

      unpack('"\\\\"');

    }

  </script>
</body>
</html>
