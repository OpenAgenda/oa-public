<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <meta name="viewport" content="width=device-width, target-densityDpi=device-dpi, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"/>
    <script type="text/javascript" src="common/common.js"></script>
    <script type="text/javascript" src="../src/v0.1/flowinate.js"></script>
    <style type="text/css">
      * { margin: 0; padding: 0; border: 0; }
      body { text-align: center; background: #333; }
      .content { max-width: 1200px; margin: 20px; }
      .block { width: 180px; padding: 10px; margin: 10px 5px; display: inline-block; vertical-align: top; background: white; }
    </style>
  </head>
  <body>
    <button id="moreup">more</button>
    <div class="content">
      <div class="block"></div>
    </div>
    <button id="moredown">more</button>
    <script type="text/javascript">

      var flowinate;

      addEvent(window, 'load', function() {

        duplicateAndRandomizeHeight(getElementsByClassName(document, 'content')[0], getElementsByClassName(document, 'block')[0], 5);

        flowinate = new Flowinate(getElementsByClassName(document, 'content')[0]);

        addEvent(document.getElementById('moredown'), 'click', function() {
          duplicateAndRandomizeHeight(getElementsByClassName(document, 'content')[0], getElementsByClassName(document, 'block')[0], 5);
        });

        addEvent(document.getElementById('moreup'), 'click', function() {
          duplicateAndRandomizeHeight(getElementsByClassName(document, 'content')[0], getElementsByClassName(document, 'block')[0], 5, false);
        });

      });

      function duplicateAndRandomizeHeight(canvas, elem, count, appendChild) {

        if (typeof appendChild == 'undefined') appendChild = true;

        if (!elem.style.height) elem.style.height = Math.ceil(Math.random()*500) + 'px';

        while(count--) {

          var div = document.createElement('div');
          div.className = elem.className;
          div.style.height = Math.ceil(Math.random()*500) + 'px';

          if (appendChild)
            canvas.appendChild(div);
          else
            canvas.insertAdjacentElement('afterbegin', div);

        }

      }

    </script>
  </body>
</html>
