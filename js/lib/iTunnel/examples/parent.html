<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <script type="text/javascript" src="../../common/common.js"></script>
    <script type="text/javascript" src="../../Base64/Base64.js"></script>
    <script type="text/javascript" src="../../urlStrings/urlStrings.js"></script>
    <script type="text/javascript" src="../../hash/hash.js"></script>
    <script type="text/javascript" src="../iTunnel.js"></script>
    <style>

    </style>
  </head>
  <body>

    <button id="paint1" disabled>Toggle iframe 1 background color</button>
    <button id="paint2" disabled>Toggle iframe 2 background color</button>
    <button id="reload1">Reload iframe 1</button>

    <iframe src="http://templates2.cibul.net/js/lib/iTunnel/examples/iframecontent1.html" width="100" height="100"></iframe>

    <iframe src="http://templates2.cibul.net/js/lib/iTunnel/examples/iframecontent2.html" width="100" height="100"></iframe>

    <script type="text/javascript">

      function onload() {} {

        var hashFallback = true;

        console.log('parent is loaded');

        var frameElems = document.getElementsByTagName('iframe');

        var tunnel1 = iTunnel({
          target: frameElems[0], 
          onReady: function(){

            console.log('parent tunnel1 is ready');
            
            document.getElementById('paint1').removeAttribute('disabled');

          },
          onReceive: function(data){
            document.getElementsByTagName('html')[0].style.backgroundColor = data.color;
          },
          forceFallback: true
        });

        var tunnel2;

        setTimeout(function(){

          tunnel2 = iTunnel({
            target: frameElems[1], 
            onReady: function(){

              console.log('parent tunnel2 is ready');

              document.getElementById('paint2').removeAttribute('disabled');

            }, 
            onReceive: function(data) {
              document.getElementsByTagName('html')[0].style.backgroundColor = data.color;
            },
            forceFallback: true
          });

        }, 100);
        

        document.getElementById('reload1').onclick = function(e) {
          frameElems[0].src = frameElems[0].src + (frameElems[0].src.indexOf('?')==-1?'?':'') + 'r';
        };

        document.getElementById('paint1').onclick = function(e) {
          tunnel1.send({action: 'changecolor'});
        };

        document.getElementById('paint2').onclick = function(e) {
          tunnel2.send({action: 'changecolor'});
        };

      }

    </script>

  </body>
</html>
