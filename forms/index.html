<!DOCTYPE html>
<html>
  <head>
    <title>Cibul Forms</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <meta name="viewport" content="width=device-width, target-densityDpi=device-dpi, user-scalable=no, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0"/>
    <!--[if IE]><script src="//html5shiv.googlecode.com/svn/trunk/html5.js"></script><![endif]-->
    <link type="text/css" href="../css/font-awesome/font-awesome.css" rel="stylesheet"/>
    <!--[if IE 7]><link rel="stylesheet" href="../css/font-awesome/font-awesome-ie7.css"><![endif]-->

    <link rel="stylesheet" href="../css/global/global.css" type="text/css"/>
    <link rel="stylesheet" href="../css/page structure/page.css" type="text/css"/>
    <link rel="stylesheet" href="../css/buttons.css" type="text/css"/>
    <link rel="stylesheet" href="css/style.css" type="text/css"/>
  </head>
  <body>
    <div class="cbody center">
      <div class="wsq">
        <h2>Here are some form fields</h2>
        <div class="cform">
          <ul>
            <li>
              <label for="basic">a basic label</label>
              <input type="text" placeholder="a basic input"/>
              <span class="info line">a simple information block</span>
              <span class="info error line">an error message</span>
            </li>
            <li>
              <label for="text">some other label</label>
              <textarea></textarea>
              <span class="info">hey jude</span>
            </li>
            <li>
              <ul class="line">
                <li>
                  <input type="text" placeholder="what"/>
                  <span class="info">whatever</span>
                </li>
                <li>
                  <input type="text" placeholder="when"/>
                  <span class="info">whenever</span>
                </li>
                <li>
                  <button>ok</button>
                </li>
              </ul>
            </li>
            <li>
              <button class="big">A big button</button>
            </li>
            <li class="line">
              <label>a button with an icon</label><button><i class="icon-refresh"></i></button>
            </li>
            <li class="line">
              <label>a button with an icon and text</label>
              <button><i class="icon-share"></i><span>share</span></button>
            </li>
            <li class="line">
              <label>small buttons</label>
              <button class="small">click me!</button>
              <button class="small"><i class="icon-facebook"></i><span>grut</span></button>
              <button class="small"><i class="icon-envelope-alt"></i></button>
            </li>
            <li class="line">
              <label>a select menu</label>
              <select>
                <option>mammoth</option>
                <option>dodo</option>
                <option>tiger</option>
              </select>
              <input type="text" />
              <button><i class="icon-save"></i></button>
            </li>
            <li>
              <label>this is a label, an input and an aligned button</label>
              <input class="line" type="text"/>
              <button>Ok</button>
              <span class="info">Here, some more information</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>
