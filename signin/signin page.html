<html>
<head>
<meta content="text/html; charset=utf-8" http-equiv="Content-Type">
<link type="text/css" href="../css/main.css" rel="stylesheet"/>
<link type="text/css" href="css/specific.css" rel="stylesheet" />
<script type="text/javascript" src="../js/jquery-1.4.4.min.js"></script>
<!--[if IE]>
  <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
<![endif]-->
</head>
<body>
<div class="body window">
  <div class="page">


<div id="signin">
  <section class="error-line display-none">
    <ul class="error_list">
      <li>The email or password do not match</li>
      <li>Try again or <a class="url" href="#">create an account<a></li>
      <li>Your account is not active. <a class="url" href="#">Resend an activation link</a></li>
    </ul>
  </section>
  <h1>Connect</h1>
  <section class="service-section">
    <h2>with an existing account</h2>
    <ul>
      <li><a href="#"><img src="images/fbbutton.png" alt="Facebook"/></a></li>
      <li><a href="#"><img src="images/twitterlogo.png" alt="Twitter"/></a></li>
    </ul>
  </section>
  <section class="cibul-section">
    <h2>with your email</h2>
    <form>
      <ul>
        <li><label class="infield">email</label><input type="text"/></li>
        <li>
          <label class="infield">password</label><input type="password"/>
          <div class="text-right"><a class="url discrete">forgot your password?</a></div>
        </li>
        <li><input type="submit" class="button small" value="Connect"/></li>
      </ul>
    </form>
  </section>
  <section class="bottom-line">
    <p>Don't have an account yet?</p> <a href="#" class="url">create one!</a>
  </section>
</div>

</div>
</div>

</body>
</html>
