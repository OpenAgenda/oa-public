<!DOCTYPE html>
<html>
<head>
  <title>Example of usage of select form</title>
  <script type="text/javascript" src="../../common/common.js"></script>
  <script type="text/javascript" src="../selectForm.js"></script>
</head>
<body>
  <form>
    <h1>Form controls</h1>
    <h2>Annoying flat sounds</h2>
    <fieldset>
      <label>Type in annoying fridge noises</label>
      <input value="humming fridge" name="one">
      <input value="dripping water" name="two">
    </fieldset>
    <h2><span>The issues</span></h2>
    <fieldset>
      <label>Type in political issues of the day</label>
      <input value="all politicians are cynical morons" name="three">
      <input value="arrh this is so depressing" name="four">
    </fieldset>
    <h2>Disney characters</h2>
    <fieldset>
      <label>Type in disney characters that die before the end of the movie</label>
      <select>Most villains, bambi's mother, mufasa</select>
    </fieldset>
    <input class="js_submit" type="submit" value="Submit">
    <input class="js_submit" type="submit" value="Update">
  </form>


  <script type="text/javascript">

    addEvent(window, 'load', function() {

      selectForm('h1', 'h2', 'fieldset', {canvas: el('form'), submit: el('.js_submit')});

    });

  </script>
</body>
</html>
