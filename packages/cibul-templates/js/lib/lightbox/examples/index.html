<!DOCTYPE html>
<html>
  <head>
    <script type="text/javascript" src="../../common/common.js"></script>
    <script type="text/javascript" src="../lightbox.js"></script>
    <style>
      * { margin: 0; padding: 0; border: 0; }
      html, body { height: 100%; }

      body { height: 1000px;}

      .lightboxcanvas { background-color: rgba(0,0,0,0.1); z-index: 9999; }
      .lightboxframe { background: white; padding: 10px; }

    </style>
  </head>
  <body>
    <button id="openlightbox">simple open</button>
    <button id="openlightboxtwice">double open</button>
    <button id="openlightboximage">image open</button>
    <button id="openlightboxbuttons">custom buttons</button>

    <script type="text/javascript">

      addEvent(window, 'load', function() {

        addEvent(document.getElementById('openlightboxbuttons'), 'click', function(){

          var l = lightbox({
            buttons: {
              ok: { label: 'Okydoke', onClick: function() { console.log('ok pressed'); }},
              nothing: { label: 'Does nothing', hide: false, onClick: function() { console.log('does not close'); } },
              cancel: { label: 'Screw this', onClick: function() { console.log('cancel pressed'); }}
            }
          });

        });


        addEvent(document.getElementById('openlightboximage'), 'click', function() {

          lightbox({
            html: '<img src="images/frog.jpg"/>',
            onOpen: function() {
              console.log('lightbox is open');
            },
            onClose: function() {
              console.log('lightbox is closed');
            }
          });

        });


        addEvent(document.getElementById('openlightboxtwice'), 'click', function() {
          lightbox({
            message: 'first time'
          });

          lightbox({
            message: 'second time'
          });
        });

        addEvent(document.getElementById('openlightbox'), 'click', function() {
          lightbox({
            message: 'Hey you'
          });
        });

      });

    </script>
  </body>
</html>
