<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">

    <script type="text/javascript" src="../../common/common.js"></script>
    <script type="text/javascript" src="http://maps.googleapis.com/maps/api/js?sensor=false"></script>
    <script type="text/javascript" src="../leaflet.js"></script>
    <script type="text/javascript" src="../maps.js"></script>
    <script type="text/javascript" src="../osm.maps.js"></script>
    <script type="text/javascript" src="../google.maps.js"></script>

    <link rel="stylesheet" href="leaflet.css" />
    <!--[if lte IE 8]><link rel="stylesheet" href="leaflet.ie.css" /><![endif]-->
    <style>

      * { margin: 0; padding: 0; border: 0; }
      html, body { height: 100%; }

      body { background: #333; text-align: center; }

      .map { display: inline-block; width: 300px; height: 300px; background-color: white; margin: 20px; border: 1px solid #222;}

    </style>
  </head>
  <body>
    <div id="osmmap" class="map"></div>
    <div id="googlemap" class="map"></div>
    <div id="googlemap2" class="map"></div>
    <div id="osmmap2" class="map"></div>
    <script type="text/javascript">

      addEvent(window, 'load', function() {

        _createAMapAndAMarker('#googlemap', 'google');

        _createAMapAndAMarker('#osmmap', 'osm', {url: 'http://otile1.mqcdn.com/tiles/1.0.0/map/{z}/{x}/{y}.jpg'});

        var items = [
          { name: 'La Grande Arche', address: 'Esplanade de la Grande Arche, Nanterre', lat: 48.892698, lng: 2.23595 },
          { name: 'L\'Arc de Triomphe', address: 'Place de l\'Etoile, Paris', lat: 48.873748, lng: 2.295013 },
          { name: 'Musée du Louvre', address: 'Place du Carrousel', lat: 48.861016, lng: 2.335772 },
          { name: 'Hotel Paris Bastille', address: '67 rue de Lyon', lat: 48.850957, lng: 2.370009 }
        ];

        _createAMapAndMarkersWithClick('#googlemap2', 'google', items, function(item) {

          console.log(item);

        });

        _createAMapAndMarkersWithClick('#osmmap2', 'osm', items, function(item) {

          console.log(item);

        });

      });

      var _createAMapAndAMarker = function(canvasSelector, service, params) {

        var canvas = el(canvasSelector);

        if (!params) params = {};

        // create a google map lib
        var mapLib = maps.use(service);

        // create a map object
        var map = mapLib.createMap(canvas, { center: [48.447052,1.486754] });

        // create a marker
        mapLib.createMarker(map, {
          position: [ 48.447,1.486 ]
        });

        // callback on bounds change

        mapLib.setOnBoundsChangeEnd(map, function(bounds) {

          var northEast = mapLib.getBoundsNorthEast(bounds);
          var southWest = mapLib.getBoundsSouthWest(bounds);

          console.log('bounds changed: ne:' + northEast[0] + ',' + northEast[1] + ' sw:' + southWest[0] + ',' + southWest[1]);

        });

      },

      _createAMapAndMarkersWithClick = function(canvasSelector, service, items, callback, params) {

        var canvas = el(canvasSelector);

        if (!params) params = {};

        // create a google map lib
        var mapLib = maps.use(service)

          , map = mapLib.createMap(canvas, { center: [48.447052,1.486754] })

          , bounds = false;

        forEach(items, function(item) {
          var marker = mapLib.createMarker(map, {
            position: [item.lat, item.lng]
          });

          mapLib.setOnMarkerClick(marker, function() {

            mapLib.setCenter(map, mapLib.getPosition(marker));

            callback(item);

          });

          if (bounds)
            mapLib.extendBounds(bounds, mapLib.getPosition(marker));
          else
            bounds = mapLib.createBounds(mapLib.getPosition(marker));
        });

        mapLib.fitBounds(map, bounds);

      };

    </script>
  </body>
</html>
