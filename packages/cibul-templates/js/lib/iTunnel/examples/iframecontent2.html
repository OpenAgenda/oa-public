<!DOCTYPE html>
<html>
  <head>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type">
    <script type="text/javascript" src="../../common/common.js"></script>
    <script type="text/javascript" src="../../Base64/Base64.js"></script>
    <script type="text/javascript" src="../../urlStrings/urlStrings.js"></script>
    <script type="text/javascript" src="../../hash/hash.js"></script>
    <script type="text/javascript" src="../iTunnel.js"></script>
    <style>
      html, body { padding: 0; margin: 0; height: 100%; }
    </style>
  </head>
  <body onload="onload()" id="child2">
    <script type="text/javascript">

      function onload() {

        console.log('====================== iframe2 content loaded ======================');

        var colors = ['#c0fcfc', '#fcfcc0']
          , i = 0;

        var tunnel = iTunnel({
          onReady: function() {
            console.log('child2 tunnel ready');

            document.getElementsByTagName('html')[0].onclick = function() {
              tunnel.send({color: colors[i%2]});
            }

          },
          onReceive: function(data) {
            
            document.getElementsByTagName('html')[0].style.backgroundColor = colors[i++%2];

          }, forceFallback: true
        });

      }

    </script>
  </body>
</html>
