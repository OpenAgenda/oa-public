# docker stack deploy -c docker-compose.dev.yml oadev
# or
# docker-compose -f docker-compose.dev.yml up
version: '3'
services:
  elasticsearch134:
    image: andrewvos/docker-elasticsearch
    environment:
      - "ES_HEAP_SIZE=512M"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata1:/usr/share/elasticsearch/data
    ports:
      - 9200:9200
      - 9300:9300
  elasticsearch533:
    image: docker.elastic.co/elasticsearch/elasticsearch:5.3.3
    environment:
      - cluster.name=docker-cluster
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - "http.host=0.0.0.0"
      - "transport.host=127.0.0.1"
      - "xpack.security.enabled=false"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - esdata2:/usr/share/elasticsearch/data
    ports:
      - 9205:9200
volumes:
  esdata1:
    driver: local
  esdata2:
    driver: local
